server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA-Fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API-Proxy zum Backend-Container
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;   # Traces mit mehreren Live-Lookups brauchen Zeit
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# IDS – Docker Compose
#
# Starten:
#   Produktion:   docker compose --profile prod up -d
#   Test/Dev:     docker compose --profile test up -d
#
# Voraussetzung: .env aus .env.example erzeugen und anpassen
# ══════════════════════════════════════════════════════════════════════════════

networks:
  ids-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

# YAML-Anchor für Container-Log-Rotation. Greift pro Service via
# `logging: *default-logging`. Schützt gegen den Disk-Voll-Fall, der
# entsteht wenn ein Service in eine Retry-Schleife rennt (z.B. Sniffer
# vs. abgestürzter Kafka-Broker → MB/s an Fehler-Logs).
# Cap pro Container: 5 × 50 MB = 250 MB. Selbst ein Tag im Retry-Storm
# bleibt damit unter 1 GB pro Container.
x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

volumes:
  kafka-data:
  timescaledb-data:
  redis-data:
  minio-data:
  ml-models:
  signature-rules:
  snort-rules:    # Persistenter Regel-Cache (Community + ET Open)
  snort-alerts:   # Shared Volume: Snort → snort-bridge
  irma-data:      # Persistiert letzte bekannte IRMA-Alarm-ID
  ids-certs:      # TLS-Zertifikate (API schreibt, nginx liest)
  master-ca:      # Master-CA für mTLS-Auth der Remote-Taps (api schreibt, master-uplink liest)
  pattern-staging: # Pattern-Federation: Tempdir für hochgeladene Bundles während Diff/Apply
  cyjan-scenarios: # Pattern-Federation: importierte Regression-Test-Scenarios (Lab-Profil liest read-only)

services:

  # ────────────────────────────────────────────────────────────────────────────
  # INFRASTRUCTURE
  # ────────────────────────────────────────────────────────────────────────────

  kafka:
    image: apache/kafka:latest
    container_name: ids-kafka
    restart: unless-stopped
    logging: *default-logging
    # Sauberer Shutdown: Kafka muss vor SIGKILL die Logs committen, Partitions
    # schließen und den Controller-Quorum freigeben. Default 10s reicht im
    # Idle-Fall, ist unter Last knapp – 30s gibt Reserve für Reboots mit
    # frischem Backlog.
    stop_grace_period: 30s
    networks: [ids-net]
    volumes:
      - kafka-data:/var/lib/kafka/data
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: controller,broker
      # PLAINTEXT: intern (container-zu-container)
      # EXTERNAL:  vom Host erreichbar (für Debugging)
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: "168"
      KAFKA_MESSAGE_MAX_BYTES: "10485760"            # 10 MB (für PCAP-Header-Batches)
      KAFKA_REPLICA_FETCH_MAX_BYTES: "10485760"
      # MUSS auf den Volume-Mountpunkt zeigen — apache/kafka-Default ist
      # /tmp/kraft-combined-logs, was im Container-Writable-Layer landet
      # und ohne Retention-Limit die Host-Disk volllaufen lässt.
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      # KRaft: feste Cluster-ID verhindert Initialisierungsfehler bei neuem Volume
      KAFKA_CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      # Einzel-Broker: Replikation auf 1 setzen
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    ports:
      - "127.0.0.1:9094:9094"                       # Kafka External – nur localhost
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  kafka-init:
    image: apache/kafka:latest
    container_name: ids-kafka-init
    networks: [ids-net]
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./infra/kafka/init-topics.sh:/init-topics.sh:ro
    entrypoint: ["/bin/bash", "/init-topics.sh"]
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ids-kafka-ui
    restart: unless-stopped
    logging: *default-logging
    networks: [ids-net]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: ids-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "${MANAGEMENT_IP:-0.0.0.0}:8080:8080"

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: ids-timescaledb
    restart: unless-stopped
    logging: *default-logging
    # Sauberer Shutdown: PostgreSQL muss bei SIGTERM einen Smart-Shutdown-
    # Checkpoint fahren (alle dirty buffers flushen, WAL syncen). Default 10s
    # reicht bei kleiner DB, kann bei großen Hypertables (Alerts/Flows wachsen
    # schnell) deutlich länger dauern. 60s schützt vor unsauberer Beendigung
    # mit potenzieller Recovery beim nächsten Boot.
    stop_grace_period: 60s
    networks: [ids-net]
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./infra/timescaledb/migrations:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_DB: ids
      POSTGRES_USER: ids
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ids-change-me}
    ports:
      - "127.0.0.1:5432:5432"                       # Nur localhost
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ids -d ids"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: ids-redis
    restart: unless-stopped
    logging: *default-logging
    networks: [ids-net]
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "127.0.0.1:6379:6379"                       # Nur localhost
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: ids-minio
    restart: unless-stopped
    logging: *default-logging
    # Sauberer Shutdown: MinIO flusht laufende PCAP-Uploads aus dem Cache,
    # schließt offene Multipart-Uploads. 30s ist reichlich für den OT-Use-
    # Case, in dem PCAPs nur ein paar MB groß sind.
    stop_grace_period: 30s
    networks: [ids-net]
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-ids-access}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-ids-secret-change-me}
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9001:9001"                       # MinIO Console – nur localhost
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  minio-init:
    image: minio/mc:latest
    container_name: ids-minio-init
    networks: [ids-net]
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./infra/minio/init-buckets.sh:/init-buckets.sh:ro
    entrypoint: ["/bin/sh", "/init-buckets.sh"]
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-ids-access}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-ids-secret-change-me}
      # Lifecycle-Retention pro Bucket. Default 7 Tage für PCAPs, weil
      # pcap-store typisch 10–20 GB pro Tag schreibt — bei 30 Tagen wäre
      # ein 500 GB Volume nötig. Konfigurierbar in .env, greift bei
      # nächstem Stack-Restart.
      PCAP_RETENTION_DAYS:    ${PCAP_RETENTION_DAYS:-7}
      EXPORTS_RETENTION_DAYS: ${EXPORTS_RETENTION_DAYS:-7}
    # restart: "no" + idempotentes init-Skript: bei jedem
    # `docker compose up -d --force-recreate` läuft das Skript erneut und
    # gleicht Buckets + Lifecycle-Rules ab. Damit kommt eine versehentlich
    # gelöschte Lifecycle-Rule beim nächsten Update von selbst zurück.
    restart: "no"

  # ────────────────────────────────────────────────────────────────────────────
  # APPLICATION SERVICES
  # ────────────────────────────────────────────────────────────────────────────

  flow-aggregator:
    build: ./flow-aggregator
    container_name: ids-flow-aggregator
    restart: unless-stopped
    logging: *default-logging
    networks: [ids-net]
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      POSTGRES_DSN: postgresql://ids:${POSTGRES_PASSWORD:-ids-change-me}@timescaledb:5432/ids
      FLOW_TIMEOUT_S: ${FLOW_TIMEOUT_S:-30}
      FLOW_MAX_DURATION_S: ${FLOW_MAX_DURATION_S:-300}
      TEST_MODE: ${TEST_MODE:-false}

  signature-engine:
    build: ./signature-engine
    container_name: ids-signature-engine
    restart: unless-stopped
    logging: *default-logging
    networks: [ids-net]
    depends_on:
      kafka:
        condition: service_healthy
      # api schreibt _known_networks.json im Startup (ins signature-rules-
      # Volume, das wir hier ebenfalls mounten). Auf service_healthy zu
      # warten garantiert, dass der CIDR-Cache beim Engine-Initial-Load
      # bereits da ist — sonst 30s lang scope=external für alle Quellen
      # bis der nächste Hot-Reload-Tick die Datei aufpickt.
      api:
        condition: service_healthy
    volumes:
      - signature-rules:/rules/custom
      - ./signature-engine/rules:/rules/builtin:ro
    environment:
      KAFKA_BROKERS: kafka:9092
      RULES_DIR: /rules
      TEST_MODE: ${TEST_MODE:-false}
      # Phase-2 Shadow-Metrik. Sampling-Rate auf 0 setzen → Topic bleibt
      # leer (z.B. während Bring-up oder bei Backpressure). Default 1 %
      # ist konservativ; in der Trainingsphase kann man via .env auf 0.05
      # oder höher gehen, um schneller Reservoir-Sample-Counts zu erreichen.
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      METRICS_TOPIC:  ${METRICS_TOPIC:-rule-metrics}
      METRICS_SAMPLING_RATE: ${METRICS_SAMPLING_RATE:-0.01}
      # Self-Traffic-Filter: kommagetrennte Liste von IPs und/oder CIDRs
      # der eigenen IDS-Hosts (Master-Mgmt-IP, Tap-Mgmt-IPs). Flows wo
      # IDS selbst Quelle ODER Ziel ist, werden vor der Rule-Auswertung
      # gedroppt — sonst feuert DOS_ICMP_001 durch enrichment-service-
      # Pings, DOS_UDP_001 durch DNS-Lookups vom Master, etc.
      # Beispiel:  IDS_OWN_IPS=10.0.0.5,10.10.20.0/24
      IDS_OWN_IPS: ${IDS_OWN_IPS:-}

  ml-engine:
    build: ./ml-engine
    container_name: ids-ml-engine
    restart: unless-stopped
    logging: *default-logging
    networks: [ids-net]
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    volumes:
      - ml-models:/models
    environment:
      KAFKA_BROKERS: kafka:9092
      POSTGRES_DSN: postgresql://ids:${POSTGRES_PASSWORD:-ids-change-me}@timescaledb:5432/ids
      MODELS_DIR: /models
      TEST_MODE: ${TEST_MODE:-false}
      BOOTSTRAP_MIN_SAMPLES: ${ML_BOOTSTRAP_MIN:-25000}
      CONTAMINATION: ${ML_CONTAMINATION:-0.005}

  alert-manager:
    build: ./alert-manager
    container_name: ids-alert-manager
    restart: unless-stopped
    logging: *default-logging
    networks: [ids-net]
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      # api applies DB-Migrations beim Startup. Wenn alert-manager vor api
      # startet und das Schema (z.B. alerts.tap_id ab Migration 011) noch
      # nicht aktualisiert ist, scheitert der INSERT. Daher Reihenfolge fix.
      api:
        condition: service_started
    environment:
      KAFKA_BROKERS: kafka:9092
      POSTGRES_DSN: postgresql://ids:${POSTGRES_PASSWORD:-ids-change-me}@timescaledb:5432/ids
      DEDUP_WINDOW_S: ${DEDUP_WINDOW_S:-300}
      TEST_MODE: ${TEST_MODE:-false}
      # Self-Traffic-Filter (richtungs-bewusst):
      # - LOOPBACK_IPS: src ODER dst matcht → drop (Container-zu-Container,
      #   loopback). Beide Seiten sind ohnehin intern.
      # - OUTBOUND_IPS: nur droppen wenn src matcht (Appliance ist Sender —
      #   Updates, DNS, Ping). Eingehende Angriffe gegen die Mgmt-IP werden
      #   dadurch NICHT mehr versehentlich gefiltert (wichtig bei Single-NIC,
      #   wo Sniffer und Mgmt auf demselben Interface hängen).
      # - IDS_SELF_IPS: legacy beidseitige Variante. Alle drei werden additiv
      #   ausgewertet — wer migrieren will, lässt IDS_SELF_IPS leer und
      #   befüllt OUTBOUND/LOOPBACK getrennt.
      IDS_SELF_LOOPBACK_IPS: ${IDS_SELF_LOOPBACK_IPS:-127.0.0.0/8,172.28.0.0/16}
      IDS_SELF_OUTBOUND_IPS: ${IDS_SELF_OUTBOUND_IPS:-${MANAGEMENT_IP:-}}
      IDS_SELF_IPS:          ${IDS_SELF_IPS:-}
      # Adaptive Suppression Thresholds (siehe docs/ML_ENGINE.md §7)
      SUPPRESSION_LEARN_WINDOW_D: ${SUPPRESSION_LEARN_WINDOW_D:-14}
      # Default 8h ≈ 1 Business-Tag: ein Muster braucht 8 distinkte Stunden
      # über die 14d-Window für eine Baseline. Vorher 24h – das war zu strikt;
      # reale Deployments zeigen, dass viele FP-Muster in 14–20 Stunden feuern
      # und damit nie für Suppression qualifiziert haben (siehe Telegram-
      # Diskussion 2026-04-29). 8h ist genug Daten für eine brauchbare
      # Mean/Std-Schätzung und passt zu typischen Office-Workloads.
      SUPPRESSION_MIN_HOURS:      ${SUPPRESSION_MIN_HOURS:-8}
      SUPPRESSION_Z_THRESHOLD:    ${SUPPRESSION_Z_THRESHOLD:-2.0}

  enrichment-service:
    build: ./enrichment-service
    container_name: ids-enrichment-service
    restart: unless-stopped
    logging: *default-logging
    networks: [ids-net]
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    cap_add: [NET_RAW]                              # ICMP Ping ohne root
    environment:
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://redis:6379
      POSTGRES_DSN: postgresql://ids:${POSTGRES_PASSWORD:-ids-change-me}@timescaledb:5432/ids
      # Hinweis: Pings gehen über die Bridge-IP des Containers.
      # Für striktes Interface-Binding (Prod): network_mode: host setzen
      # und KAFKA_BROKERS auf localhost:9094 / REDIS_URL auf localhost:6379 ändern.
      MANAGEMENT_IFACE: ${MANAGEMENT_IFACE:-eth0}
      PING_TIMEOUT_MS: ${PING_TIMEOUT_MS:-1000}
      DNS_TIMEOUT_MS: ${DNS_TIMEOUT_MS:-2000}
      CACHE_TTL_S: ${CACHE_TTL_S:-3600}
      TEST_MODE: ${TEST_MODE:-false}
    volumes:
      - ./geoip:/geoip:ro

  pcap-store:
    build: ./pcap-store
    container_name: ids-pcap-store
    restart: unless-stopped
    logging: *default-logging
    networks: [ids-net]
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-ids-access}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-ids-secret-change-me}
      PCAP_BUCKET: ids-pcaps
      PCAP_WINDOW_S: ${PCAP_WINDOW_S:-60}          # ±Sekunden um Alert-Timestamp
      POSTGRES_DSN: postgresql://ids:${POSTGRES_PASSWORD:-ids-change-me}@timescaledb:5432/ids

  api:
    build: ./api
    container_name: ids-api
    restart: unless-stopped
    logging: *default-logging
    networks: [ids-net]
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      POSTGRES_DSN: postgresql://ids:${POSTGRES_PASSWORD:-ids-change-me}@timescaledb:5432/ids
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-ids-access}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-ids-secret-change-me}
      PCAP_BUCKET: ids-pcaps
      KAFKA_BROKERS: kafka:9092
      TEST_MODE: ${TEST_MODE:-false}
      SECRET_KEY: ${API_SECRET_KEY:-change-me-in-production}
      RULES_DIR: /rules
      MODELS_DIR: /models
      ML_BOOTSTRAP_MIN: ${ML_BOOTSTRAP_MIN:-500}
      # SUPPRESSION_-Werte für /api/ml/learned (UI zeigt sie an).
      # Müssen identisch zum alert-manager-Block oben sein.
      SUPPRESSION_LEARN_WINDOW_D: ${SUPPRESSION_LEARN_WINDOW_D:-14}
      SUPPRESSION_MIN_HOURS:      ${SUPPRESSION_MIN_HOURS:-8}
      SUPPRESSION_Z_THRESHOLD:    ${SUPPRESSION_Z_THRESHOLD:-2.0}
      MIRROR_IFACE: ${MIRROR_IFACE:-}
      MANAGEMENT_IFACE: ${MANAGEMENT_IFACE:-}
      MASTER_CA_DIR: /var/lib/cyjan/master-ca
      # Pattern-Federation Lab-Modus: aktiviert /api/pattern/export-Endpoint
      # und legt CYJAN_LAB_ID als Bundle-Origin-Tag fest. Default OFF.
      REDTEAM_ENABLED: "${REDTEAM_ENABLED:-false}"
      CYJAN_LAB_ID:    "${CYJAN_LAB_ID:-}"
      PATTERN_SIGNING_PASSPHRASE: "${PATTERN_SIGNING_PASSPHRASE:-}"
    volumes:
      - snort-rules:/rules
      # signature-rules-Volume für Per-Regel Overrides + Custom-YAML.
      # signature-engine schreibt nichts hier rein, api übernimmt die GUI-
      # Schreib-Pfade (Settings → Rule-Anpassungen).
      - signature-rules:/sig-rules
      - ml-models:/models
      - ids-certs:/certs
      - master-ca:/var/lib/cyjan/master-ca
      # Pattern-Federation: Bundle-Staging-Tempdir + Scenarios-Volume
      # (für tests.regression aus importierten Bundles). Volume kann auch
      # leer bleiben wenn redteam-Profil nicht aktiv ist.
      - pattern-staging:/var/lib/cyjan/pattern-staging
      - cyjan-scenarios:/cyjan-scenarios
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/ids:/opt/ids
      - ./infra/timescaledb/migrations:/migrations:ro
      # /sys komplett (ro): Einträge unter /sys/class/net sind Symlinks nach
      # /sys/devices/.../net/<iface>. Ohne den Rest von /sys zeigen sie ins
      # Leere und das Frontend bekommt unter "Interfaces" leere Felder
      # (operstate=unknown, mac="", addresses=[]).
      - /sys:/host/sys:ro
      - /proc:/host/proc:ro
    ports:
      - "${MANAGEMENT_IP:-0.0.0.0}:${API_PORT:-8001}:8000"
    # Healthcheck deckt das gesamte FastAPI-startup() ab — inkl. CA-Init,
    # known_networks-Sync ins sig-rules-Volume und Streamer-Start. /health
    # antwortet erst nach Abschluss aller startup-Hooks (FastAPI serviert
    # vorher keine Requests). signature-engine hängt sich darauf, damit der
    # Loader beim Initial-Load das _known_networks.json garantiert sieht
    # (sonst Race: 30s lang Records mit scope=external für interne IPs).
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ───────────────────────────────────────────────────────────────────────
  # RULE-TUNER (Phase 4) – konsumiert rule-metrics, hält Reservoirs,
  # persistiert Quantile in rule_baselines und schreibt im State 'tuning'
  # alle 6h Overrides via PUT /api/sig-rules/overrides. Master-only.
  # ───────────────────────────────────────────────────────────────────────
  rule-tuner:
    build: ./rule-tuner
    container_name: ids-rule-tuner
    restart: unless-stopped
    logging: *default-logging
    profiles: [prod]
    networks: [ids-net]
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      METRICS_TOPIC: rule-metrics
      KAFKA_GROUP_ID: rule-tuner
      POSTGRES_DSN: postgresql://ids:${POSTGRES_PASSWORD:-ids-change-me}@timescaledb:5432/ids
      API_BASE_URL: http://api:8000
      # Identisch zum SECRET_KEY der api — der Tuner mintet selbst ein
      # langlebiges JWT mit role=admin (kein User-DB-Eintrag nötig, weil
      # get_current_user nur die Signatur prüft).
      API_SECRET_KEY: ${API_SECRET_KEY:-change-me-in-production}
      RESERVOIR_SIZE: ${TUNER_RESERVOIR_SIZE:-10000}
      PERSIST_INTERVAL_S: ${TUNER_PERSIST_INTERVAL_S:-60}
      STATE_POLL_INTERVAL_S: ${TUNER_STATE_POLL_INTERVAL_S:-30}
      TUNING_CYCLE_S: ${TUNER_TUNING_CYCLE_S:-21600}
      MIN_SAMPLES: ${TUNER_MIN_SAMPLES:-100}
      LOG_LEVEL: INFO

  # ───────────────────────────────────────────────────────────────────────
  # MASTER-UPLINK – mTLS-WebSocket-Endpunkt für Remote-Taps. Hört separat
  # auf 8443, damit der reguläre api-Container weiterhin nur JWT-Auth
  # macht. Teilt sich das master-ca-Volume mit der api (api bootstrappt
  # die CA, master-uplink liest sie als Server-Cert + Trust-Root).
  # ───────────────────────────────────────────────────────────────────────
  master-uplink:
    build: ./master-uplink
    container_name: ids-master-uplink
    restart: unless-stopped
    logging: *default-logging
    networks: [ids-net]
    depends_on:
      api:
        condition: service_started   # api bootstrappt die CA
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      ALERTS_TOPIC: alerts-raw
      METRICS_TOPIC: rule-metrics
      POSTGRES_DSN: postgresql://ids:${POSTGRES_PASSWORD:-ids-change-me}@timescaledb:5432/ids
      MASTER_CA_DIR: /var/lib/cyjan/master-ca
      UPLINK_HOST: 0.0.0.0
      UPLINK_PORT: 8443
      RULES_DIR: /rules
      LOG_LEVEL: INFO
      # MinIO-Zugang für PCAP-Upload aus tap-uplink-Frames (V1: tap-uplink
      # hält ±60s pcap-headers in-memory und schickt das fertige PCAP über
      # die mTLS-WSS, master-uplink lädt es hier in den ids-pcaps-Bucket).
      MINIO_ENDPOINT:   minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-ids-access}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-ids-secret-change-me}
      PCAP_BUCKET:      ids-pcaps
      PUSH_TOPIC:       alerts-enriched-push
    volumes:
      - master-ca:/var/lib/cyjan/master-ca:ro
      # Reverse-Channel: master-uplink liefert die buildin-Regeln + Custom-
      # Overrides via GET /config aus. Kein Schreibzugriff nötig.
      - signature-rules:/rules/custom:ro
      - ./signature-engine/rules:/rules/builtin:ro
      # Tap-Update-Pfad: /opt/ids/tap-update/ wird vom System-Update-Pfad
      # befüllt (images-tap.tar.zst + manifest.json + Compose + scripts).
      # master-uplink serviert sie via mTLS-protected HTTP-GETs nach
      # /tap-update/<file> für `cyjan-tap update --from-master`.
      - /opt/ids/tap-update:/tap-update:ro
    ports:
      - "${MANAGEMENT_IP:-0.0.0.0}:${UPLINK_PORT:-8443}:8443"

  frontend:
    build: ./frontend
    container_name: ids-frontend
    restart: unless-stopped
    logging: *default-logging
    networks: [ids-net]
    depends_on:
      - api
    environment:
      VITE_API_URL: http://${MANAGEMENT_IP:-localhost}:${API_PORT:-8001}
      VITE_WS_URL: ws://${MANAGEMENT_IP:-localhost}:${API_PORT:-8001}
      VITE_TEST_MODE: ${TEST_MODE:-false}
    volumes:
      - ids-certs:/certs:ro
    ports:
      - "${MANAGEMENT_IP:-0.0.0.0}:80:80"
      - "${MANAGEMENT_IP:-0.0.0.0}:443:443"

  training-loop:
    build: ./training-loop
    container_name: ids-training-loop
    restart: unless-stopped
    logging: *default-logging
    networks: [ids-net]
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    volumes:
      - ml-models:/models
    environment:
      KAFKA_BROKERS: kafka:9092
      POSTGRES_DSN: postgresql://ids:${POSTGRES_PASSWORD:-ids-change-me}@timescaledb:5432/ids
      MODELS_DIR: /models
      RETRAIN_INTERVAL_S: ${RETRAIN_INTERVAL_S:-86400}
      TEST_MODE: ${TEST_MODE:-false}

  # ────────────────────────────────────────────────────────────────────────────
  # IRMA BRIDGE  (immer aktiv wenn IRMA_USER + IRMA_PASS gesetzt)
  #
  # Pollt die IRMA REST-API und importiert neue Alarme als source='external'.
  # Setzt IRMA_USER und IRMA_PASS in der .env-Datei.
  # ────────────────────────────────────────────────────────────────────────────

  irma-bridge:
    build: ./irma-bridge
    container_name: ids-irma-bridge
    restart: unless-stopped
    logging: *default-logging
    networks: [ids-net]
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    volumes:
      - irma-data:/data
    environment:
      KAFKA_BROKERS:       kafka:9092
      POSTGRES_DSN:        postgresql://ids:${POSTGRES_PASSWORD}@timescaledb:5432/ids
      IRMA_BASE_URL:       ${IRMA_BASE_URL:-https://10.133.168.115/rest}
      IRMA_USER:           ${IRMA_USER:-}
      IRMA_PASS:           ${IRMA_PASS:-}
      IRMA_POLL_INTERVAL:  ${IRMA_POLL_INTERVAL:-30}
      IRMA_SSL_VERIFY:     ${IRMA_SSL_VERIFY:-false}

  # ────────────────────────────────────────────────────────────────────────────
  # MQTT-BRIDGE — Outbound-Publisher zu externem MQTT-Broker (Mosquitto/HiveMQ)
  #
  # Konsumiert alerts-enriched + Master-DB für State-Topics. Publiziert pro
  # Origin (Master oder gepairter Tap) auf {prefix}/{host}/alerts/{sev}/{src}.
  # Plus retained State auf {prefix}/{host}/threat, .../status, .../taps/.../status.
  # Default deaktiviert — MQTT_ENABLED=true in .env aktiviert.
  # ────────────────────────────────────────────────────────────────────────────

  mqtt-bridge:
    build: ./mqtt-bridge
    container_name: ids-mqtt-bridge
    restart: unless-stopped
    logging: *default-logging
    networks: [ids-net]
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      MQTT_ENABLED:               ${MQTT_ENABLED:-false}
      KAFKA_BROKERS:              kafka:9092
      POSTGRES_DSN:               postgresql://ids:${POSTGRES_PASSWORD}@timescaledb:5432/ids
      MQTT_ALERTS_TOPIC:          alerts-enriched
      MQTT_BROKER_HOST:           ${MQTT_BROKER_HOST:-}
      MQTT_BROKER_PORT:           ${MQTT_BROKER_PORT:-8883}
      MQTT_USE_TLS:               ${MQTT_USE_TLS:-true}
      MQTT_TLS_VERIFY:            ${MQTT_TLS_VERIFY:-true}
      MQTT_USERNAME:              ${MQTT_USERNAME:-}
      MQTT_PASSWORD:              ${MQTT_PASSWORD:-}
      MQTT_CLIENT_ID:             ${MQTT_CLIENT_ID:-}
      MQTT_MASTER_HOST_ID:        ${MQTT_MASTER_HOST_ID:-}
      MQTT_TOPIC_PREFIX:          ${MQTT_TOPIC_PREFIX:-cyjan}
      MQTT_QOS_EVENTS:            ${MQTT_QOS_EVENTS:-1}
      MQTT_QOS_STATE:             ${MQTT_QOS_STATE:-0}
      MQTT_RATE_LIMIT_PER_SEC:    ${MQTT_RATE_LIMIT_PER_SEC:-200}
      MQTT_INFLIGHT_MAX:          ${MQTT_INFLIGHT_MAX:-10}
      MQTT_THREAT_INTERVAL_S:     ${MQTT_THREAT_INTERVAL_S:-30}
      MQTT_TAP_INTERVAL_S:        ${MQTT_TAP_INTERVAL_S:-30}
      MQTT_SEVERITY_MIN:          ${MQTT_SEVERITY_MIN:-low}
      MQTT_SOURCES:               ${MQTT_SOURCES:-signature,ml,suricata,external}
      MQTT_RULE_ID_BLOCKLIST:     ${MQTT_RULE_ID_BLOCKLIST:-}

  # ────────────────────────────────────────────────────────────────────────────
  # SNIFFER – PRODUKTION  (docker compose --profile prod up)
  #
  # Benötigt: MIRROR_IFACE gesetzt in .env
  # network_mode: host → direkter Zugriff auf physische Interfaces via AF_PACKET
  # ────────────────────────────────────────────────────────────────────────────

  sniffer:
    build: ./sniffer
    container_name: ids-sniffer
    restart: unless-stopped
    logging: *default-logging
    network_mode: host
    profiles: [prod]
    depends_on:
      kafka:
        condition: service_healthy
    cap_add: [NET_RAW, NET_ADMIN]
    environment:
      MIRROR_IFACE: ${MIRROR_IFACE:?MIRROR_IFACE muss in .env gesetzt sein}
      KAFKA_BROKERS: localhost:9094                  # External Listener (network_mode: host)
      CAPTURE_SNAPLEN: ${CAPTURE_SNAPLEN:-128}
      CAPTURE_RING_BUFFER_MB: ${CAPTURE_RING_BUFFER_MB:-64}
      TEST_MODE: "false"

  # ────────────────────────────────────────────────────────────────────────────
  # SNIFFER – TEST  (docker compose --profile test up)
  #
  # Lauscht auf dem Docker-Bridge-Interface (eth0 im Container).
  # Mit CAP_NET_ADMIN + promiscuous mode sieht er den gesamten Bridge-Traffic.
  # ────────────────────────────────────────────────────────────────────────────

  sniffer-test:
    build: ./sniffer
    container_name: ids-sniffer-test
    restart: unless-stopped
    logging: *default-logging
    networks: [ids-net]
    profiles: [test]
    depends_on:
      kafka:
        condition: service_healthy
    cap_add: [NET_RAW, NET_ADMIN]
    environment:
      MIRROR_IFACE: ${TEST_IFACE:-eth0}
      KAFKA_BROKERS: kafka:9092
      CAPTURE_SNAPLEN: ${CAPTURE_SNAPLEN:-128}
      CAPTURE_RING_BUFFER_MB: "16"
      TEST_MODE: "true"

  # ────────────────────────────────────────────────────────────────────────────
  # TRAFFIC GENERATOR  (nur test-Profil)
  #
  # Injiziert synthetische Flows direkt ins Kafka-Topic 'flows' –
  # kein Packet-Capture oder Raw-Socket nötig.
  # Im prod-Profil läuft er NICHT – dort kommt Traffic nur vom echten Sniffer.
  # ────────────────────────────────────────────────────────────────────────────

  traffic-generator:
    build: ./traffic-generator
    container_name: ids-traffic-generator
    restart: unless-stopped
    logging: *default-logging
    networks: [ids-net]
    profiles: [test]
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      POSTGRES_DSN: postgresql://ids:${POSTGRES_PASSWORD:-ids-change-me}@timescaledb:5432/ids
      FLOWS_TOPIC: flows
      SRC_IP: "10.255.255.100"
      TARGET_IP: "10.255.255.1"

  # ────────────────────────────────────────────────────────────────────────────
  # SNORT – PRODUKTION  (docker compose --profile prod --profile snort up)
  #
  # Suricata auf dem Mirror-Interface → schreibt EVE JSON → snort-bridge
  # network_mode: host → direkter AF_PACKET-Zugriff wie beim Sniffer
  # (Hinweis: Service heißt weiterhin 'snort' für Kompatibilität mit Profilen)
  # ────────────────────────────────────────────────────────────────────────────

  snort:
    build: ./snort
    container_name: ids-snort
    restart: unless-stopped
    logging: *default-logging
    network_mode: host
    profiles: [snort]
    cap_add: [NET_RAW, NET_ADMIN]
    volumes:
      - snort-alerts:/var/log/suricata
      - snort-rules:/etc/suricata/rules
    environment:
      SNORT_IFACE: ${MIRROR_IFACE:-eth1}
      SNORT_RULESET: ${SNORT_RULESET:-emerging-threats}
      SNORT_UPDATE_RULES: ${SNORT_UPDATE_RULES:-false}

  # ────────────────────────────────────────────────────────────────────────────
  # SURICATA – TEST  (docker compose --profile test --profile snort-test up)
  #
  # Lauscht auf dem Docker-Bridge-Interface; teilt ids-net mit allen Services.
  # ────────────────────────────────────────────────────────────────────────────

  snort-test:
    build: ./snort
    container_name: ids-snort-test
    restart: unless-stopped
    logging: *default-logging
    networks: [ids-net]
    profiles: [snort-test]
    cap_add: [NET_RAW, NET_ADMIN]
    volumes:
      - snort-alerts:/var/log/suricata
      - snort-rules:/etc/suricata/rules
    environment:
      SNORT_IFACE: ${TEST_IFACE:-eth0}
      SNORT_RULESET: ${SNORT_RULESET:-emerging-threats}
      SNORT_UPDATE_RULES: ${SNORT_UPDATE_RULES:-false}

  # ────────────────────────────────────────────────────────────────────────────
  # SURICATA-BRIDGE  (startet mit snort ODER snort-test Profil)
  #
  # Liest eve.json aus dem Shared-Volume und publiziert nach alerts-raw.
  # Alert-Manager, Enrichment und Frontend verarbeiten Alerts transparent.
  # ────────────────────────────────────────────────────────────────────────────

  snort-bridge:
    build: ./snort-bridge
    container_name: ids-snort-bridge
    restart: unless-stopped
    logging: *default-logging
    networks: [ids-net]
    profiles: [snort, snort-test]
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - snort-alerts:/var/log/suricata:ro
      # Read-only Mount auf den signature-rules-Volume für Per-SID-Overrides.
      # Datei: /sig-rules/custom/_suricata_overrides.json. snort-bridge liest
      # nur, geschrieben wird ausschließlich von der api.
      - signature-rules:/sig-rules:ro
    environment:
      KAFKA_BROKERS: kafka:9092
      SNORT_ALERT_FILE: /var/log/suricata/eve.json
      TEST_MODE: ${TEST_MODE:-false}
      SURICATA_OVERRIDES_FILE: /sig-rules/custom/_suricata_overrides.json

# Host-Rollen-Katalog — siehe docs/contracts/host-roles.md
- id: rdp_host
  label: "RDP Host"
  category: remote-access
  match:
    required_ports:
      - {port: 3389, proto: TCP}   # Remote Desktop Protocol
    any_ports: null
    optional_flags: []
  min_flows_per_port: 3
  base_confidence: 0.82            # Port 3389 ist eindeutig RDP
  confidence_bonus: {per_optional_port: 0.0, long_lived: 0.05}
  fingerprint: null
  mac_oui: []

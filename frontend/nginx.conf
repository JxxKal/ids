# JWT-Leak-Schutz: der WebSocket (?token=<JWT>) und der SAML-Redirect
# (/?saml_token=<JWT>) tragen das Bearer-Token im Query-String — Browser-WS
# können keine Auth-Header setzen, deshalb ist die Query-Variante nötig. Damit
# das Token nicht im Access-Log (→ docker logs / Log-Aggregation) landet, loggen
# wir die betroffenen Pfade mit $uri (Pfad OHNE Query) statt $request. Dieses
# conf.d-File wird im http{}-Kontext inkludiert — log_format gehört genau dorthin
# (im server{}-Block wäre es "directive not allowed here").
log_format masked '$remote_addr - $remote_user [$time_local] '
                  '"$request_method $uri $server_protocol" '
                  '$status $body_bytes_sent "$http_referer" "$http_user_agent"';

server {
    listen 3000;
    client_max_body_size 2g;

    root /usr/share/nginx/html;
    index index.html;

    # Docker-internes DNS – löst Service-Namen dynamisch auf (wichtig bei
    # Container-Neustarts, sonst cached nginx die alte IP → 502)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # SPA-Routing: alle Pfade auf index.html.
    #
    # index.html (und alle SPA-Fallback-HTML) NIE cachen — sonst liefert der
    # Browser nach einem Update die alte index.html mit dem alten Bundle-Hash
    # aus, und der neue Code läuft erst nach einem manuellen Hard-Reload. Genau
    # das verursachte den "Update wirkt erst nach Reload"-Effekt (u.a. der
    # WebSocket-Live-Mode-Fix kam beim Fresh-Login nicht an). no-cache erzwingt
    # eine Revalidierung pro Load; da der Asset-Hash sich bei jedem Build ändert,
    # zieht der Browser dann automatisch den neuen Bundle.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate" always;
        # Fängt den SAML-Redirect /?saml_token=<JWT> ab → Query nicht ins Log.
        access_log /var/log/nginx/access.log masked;
    }

    # Content-hashed Build-Assets (Vite: /assets/<name>-<hash>.js|css) sind
    # unveränderlich — der Hash ändert sich bei jeder Änderung. Lange cachen,
    # damit nur die kleine index.html pro Load revalidiert wird.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # REST-API-Proxy
    location /api/ {
        set $upstream http://api:8000;
        proxy_pass $upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Admin-Endpoints (maintenance/stats, vacuum, pcap-cleanup …) brauchen
        # mehr als nginx-Default 60 s.
        proxy_read_timeout    180s;
        proxy_send_timeout    180s;
        proxy_connect_timeout 10s;
    }

    # WebSocket-Proxy
    location /ws/ {
        set $upstream http://api:8000;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
        # ?token=<JWT> nicht ins Access-Log schreiben.
        access_log /var/log/nginx/access.log masked;
    }

    # Health-Check
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

server {
    listen 3000;
    client_max_body_size 2g;

    root /usr/share/nginx/html;
    index index.html;

    # Docker-internes DNS – löst Service-Namen dynamisch auf (wichtig bei
    # Container-Neustarts, sonst cached nginx die alte IP → 502)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # SPA-Routing: alle Pfade auf index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST-API-Proxy
    location /api/ {
        set $upstream http://api:8000;
        proxy_pass $upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Admin-Endpoints (maintenance/stats, vacuum, pcap-cleanup …) brauchen
        # mehr als nginx-Default 60 s.
        proxy_read_timeout    180s;
        proxy_send_timeout    180s;
        proxy_connect_timeout 10s;
    }

    # WebSocket-Proxy
    location /ws/ {
        set $upstream http://api:8000;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
    }

    # Health-Check
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css">
<style>
  .card-frame { padding: 24px; gap: 18px; }
  .ramp { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .s {
    aspect-ratio: 1.1 / 1;
    border-radius: 6px;
    padding: 8px 10px;
    font-family: var(--cy-font-mono);
    font-size: 10px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .s .n { font-weight: 600; font-size: 11px; }
  .s .h { opacity: 0.65; font-size: 9px; }
</style>
</head><body>
<div class="card-frame">
  <div>
    <div class="label-eyebrow">Slate — surfaces, text, chrome</div>
    <div class="ramp" style="margin-top:8px">
      <div class="s" style="background:#f1f5f9;color:#0b1120"><span class="n">100</span><span class="h">f1f5f9</span></div>
      <div class="s" style="background:#cbd5e1;color:#0b1120"><span class="n">300</span><span class="h">cbd5e1</span></div>
      <div class="s" style="background:#94a3b8;color:#0b1120"><span class="n">400</span><span class="h">94a3b8</span></div>
      <div class="s" style="background:#64748b;color:#f1f5f9"><span class="n">500</span><span class="h">64748b</span></div>
      <div class="s" style="background:#334155;color:#e2e8f0"><span class="n">700</span><span class="h">334155</span></div>
      <div class="s" style="background:#1e293b;color:#e2e8f0"><span class="n">800</span><span class="h">1e293b</span></div>
      <div class="s" style="background:#0f172a;color:#e2e8f0;border:1px solid #1e293b"><span class="n">900</span><span class="h">0f172a</span></div>
    </div>
  </div>
  <div style="display:grid;grid-template-columns: 1fr 1fr 1fr; gap: 10px">
    <div style="padding:14px;border-radius:8px;background:#020617;border:1px solid #172033">
      <div style="font-family:var(--cy-font-mono);font-size:10px;color:#64748b">--cy-bg-void</div>
      <div style="font-family:var(--cy-font-mono);font-size:12px;color:#e2e8f0;margin-top:4px">#020617</div>
      <div style="font-size:10px;color:#475569;margin-top:6px">page · behind hex</div>
    </div>
    <div style="padding:14px;border-radius:8px;background:#0b1120;border:1px solid #172033">
      <div style="font-family:var(--cy-font-mono);font-size:10px;color:#64748b">--cy-bg-base</div>
      <div style="font-family:var(--cy-font-mono);font-size:12px;color:#e2e8f0;margin-top:4px">#0b1120</div>
      <div style="font-size:10px;color:#475569;margin-top:6px">dashboard body</div>
    </div>
    <div style="padding:14px;border-radius:8px;background:#0f172a;border:1px solid #172033">
      <div style="font-family:var(--cy-font-mono);font-size:10px;color:#64748b">--cy-bg-raised</div>
      <div style="font-family:var(--cy-font-mono);font-size:12px;color:#e2e8f0;margin-top:4px">#0f172a</div>
      <div style="font-size:10px;color:#475569;margin-top:6px">card surface</div>
    </div>
  </div>
</div>
</body></html>

<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css">
<style>
  .card-frame { padding: 20px 24px; gap: 10px; background: #020617; }
  .title { font-family: var(--cy-font-sans); font-weight: 700; letter-spacing: 0.24em; color: #e0f2fe; text-transform: uppercase; font-size: 14px; }
  .title .ac { color: #38bdf8; }
  .motto { font-family: var(--cy-font-sans); font-size: 11px; color: #7dd3fc; letter-spacing: 0.3em; }
  .icons { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; padding: 12px; background: #0f172a; border: 1px solid #172033; border-radius: 6px; }
  .i { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: #64748b; font-family: var(--cy-font-mono); font-size: 8px; }
  .i svg { width: 20px; height: 20px; stroke-width: 1.6; color: #94a3b8; }
  .i:hover svg { color: #38bdf8; }
  .glyph-row { display: flex; gap: 12px; padding: 8px 12px; font-family: var(--cy-font-mono); font-size: 18px; color: #7dd3fc; background: #0f172a; border: 1px solid #172033; border-radius: 6px; }
  .glyph-row .g { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .glyph-row .g span { font-size: 9px; color: #64748b; letter-spacing: 0.08em; }
</style>
</head><body>
<div class="card-frame">
  <div class="label-eyebrow">Iconography — Lucide stroke, monochrome slate</div>
  <div class="icons">
    <div class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2L3 7v6c0 5 4 9 9 9s9-4 9-9V7l-9-5z"/></svg>shield</div>
    <div class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18M7 14h4"/></svg>server</div>
    <div class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18"/></svg>network</div>
    <div class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>search</div>
    <div class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10 2v6l-4 8a4 4 0 0 0 4 6h4a4 4 0 0 0 4-6l-4-8V2M8 2h8"/></svg>flask</div>
    <div class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19 12l2 1-2 3-3-1-2 2-1-3 2-3 3 1zM5 12l-2 1 2 3 3-1 2 2 1-3-2-3-3 1z"/></svg>settings</div>
    <div class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 7h14l4 4v10H3z"/><path d="M8 21v-6h8v6"/></svg>save</div>
    <div class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2v10M5 9l7 7 7-7M5 22h14"/></svg>download</div>
  </div>
  <div class="label-eyebrow" style="margin-top:4px">Unicode glyphs used as icons</div>
  <div class="glyph-row">
    <div class="g">↓<span>download</span></div>
    <div class="g">→<span>next</span></div>
    <div class="g">·<span>sep</span></div>
    <div class="g" style="color:#86efac">✓<span>confirm</span></div>
    <div class="g" style="color:#fdba74">⚠<span>warn</span></div>
    <div class="g" style="color:#94a3b8">×12<span>count</span></div>
    <div class="g" style="color:#94a3b8">⊞<span>grid</span></div>
    <div class="g" style="color:#94a3b8">≡<span>list</span></div>
  </div>
</div>
</body></html>

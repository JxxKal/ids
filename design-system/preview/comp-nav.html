<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css">
<style>
  .card-frame { padding: 22px 26px; gap: 10px; background: #0b1120; }
  .nav {
    display: grid; grid-template-columns: 200px 1fr; gap: 16px;
  }
  .side {
    background: #0f172a;
    border: 1px solid #172033;
    border-radius: 6px;
    padding: 12px 8px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .brand { display:flex; align-items: center; gap: 10px; padding: 4px 10px 12px; border-bottom: 1px solid #172033; margin-bottom: 6px; }
  .brand .mark { width: 22px; height: 22px; border-radius: 4px; background: linear-gradient(135deg,#06b6d4,#0284c7); display:grid;place-items:center; color:#041418; font-weight:900;font-size:10px;letter-spacing:0.1em;font-family:var(--cy-font-sans);}
  .brand .name { font-family: var(--cy-font-sans); font-weight: 700; letter-spacing: 0.24em; font-size: 13px; color: #e0f2fe; }
  .brand .name .a { color:#38bdf8; }
  .item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; font-family: var(--cy-font-sans); font-size: 13px; color: #94a3b8; border-radius: 4px; cursor: pointer;}
  .item:hover { color: #e0f2fe; background: rgba(14,165,233,0.05); }
  .item.active { background: rgba(14,165,233,0.12); color: #7dd3fc; border-left: 2px solid #0ea5e9; padding-left: 8px; }
  .item svg { width: 16px; height: 16px; stroke-width: 1.8; }
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid #172033; padding-bottom: 0; }
  .tab { padding: 8px 14px; font-family: var(--cy-font-sans); font-size: 13px; color: #64748b; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px;}
  .tab.active { color: #38bdf8; border-bottom-color: #0ea5e9; }
  .toolbar { display: flex; gap: 8px; padding: 10px 0; }
  .chip-tb { padding: 4px 10px; border-radius: 4px; background: #0f172a; border: 1px solid #1e293b; font-family: var(--cy-font-mono); font-size: 11px; color: #94a3b8; }
  .chip-tb.on { border-color: #0ea5e9; color: #7dd3fc; }
</style>
</head><body>
<div class="card-frame">
  <div class="label-eyebrow">Navigation — sidebar + tabs</div>
  <div class="nav">
    <div class="side">
      <div class="brand">
        <div class="mark">C</div>
        <div class="name">CY<span class="a">JAN</span></div>
      </div>
      <div class="item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
        Dashboard
      </div>
      <div class="item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><path d="M10 6h7M6 10v7"/></svg>
        Netzwerk
      </div>
      <div class="item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="6" rx="1"/><rect x="3" y="14" width="18" height="6" rx="1"/><circle cx="7" cy="7" r="0.8" fill="currentColor"/><circle cx="7" cy="17" r="0.8" fill="currentColor"/></svg>
        Hosts
      </div>
      <div class="item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10 2v6l-4 8a4 4 0 0 0 4 6h4a4 4 0 0 0 4-6l-4-8V2"/><path d="M8 2h8"/></svg>
        Szenarien
      </div>
      <div class="item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19 12l2 1-2 3-3-1-2 2-1-3 2-3 3 1zM5 12l-2 1 2 3 3-1 2 2 1-3-2-3-3 1z" /></svg>
        Einstellungen
      </div>
    </div>
    <div>
      <div class="tabs">
        <div class="tab active">Live Alerts</div>
        <div class="tab">Grouped</div>
        <div class="tab">Snapshot</div>
        <div class="tab">Feedback</div>
      </div>
      <div class="toolbar">
        <span class="chip-tb on">Severity: alle</span>
        <span class="chip-tb">Tags: modbus, dnp3</span>
        <span class="chip-tb">Source: Sniffer</span>
        <span class="chip-tb">Last 1h</span>
      </div>
    </div>
  </div>
</div>
</body></html>

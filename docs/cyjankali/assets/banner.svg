<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" role="img" aria-label="CYJANKALI – Den Wächter angreifen, den Angreifer erkennen">
  <title>CYJANKALI</title>
  <defs>
    <!-- Hintergrund-Glow (zentral, leichter Sky-Blue-Schimmer) -->
    <radialGradient id="bgGlow" cx="50%" cy="55%" r="65%">
      <stop offset="0%"   stop-color="#13283d"/>
      <stop offset="60%"  stop-color="#0a1424"/>
      <stop offset="100%" stop-color="#070d18"/>
    </radialGradient>

    <!-- Glas der Apothekerflasche – warmes Bernstein-Braun mit Tiefe -->
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#a85f30"/>
      <stop offset="35%"  stop-color="#7a3e1a"/>
      <stop offset="80%"  stop-color="#4a230d"/>
      <stop offset="100%" stop-color="#2c1308"/>
    </linearGradient>
    <linearGradient id="glassRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5b2e15"/>
      <stop offset="100%" stop-color="#1a0904"/>
    </linearGradient>

    <!-- Korken -->
    <linearGradient id="cork" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7a4d2a"/>
      <stop offset="50%"  stop-color="#5a361a"/>
      <stop offset="100%" stop-color="#3d2208"/>
    </linearGradient>

    <!-- Etikett (Pergament) -->
    <linearGradient id="label" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f0d9a8"/>
      <stop offset="100%" stop-color="#cdb37a"/>
    </linearGradient>

    <!-- Roter Drachen-Glow für die rechte Akzent-Silhouette -->
    <radialGradient id="dragonGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#ef4444" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7f1d1d" stop-opacity="0"/>
    </radialGradient>

    <!-- Hex-Tile zum Kacheln -->
    <pattern id="hexTile" x="0" y="0" width="48" height="42" patternUnits="userSpaceOnUse">
      <polygon points="24,2 46,15 46,40 24,53 2,40 2,15"
               fill="none" stroke="#0ea5e9" stroke-width="0.6" opacity="0.18"/>
    </pattern>
  </defs>

  <!-- 1) Hintergrund + Hex-Grid -->
  <rect width="1280" height="400" fill="url(#bgGlow)"/>
  <rect width="1280" height="400" fill="url(#hexTile)" opacity="0.55"/>

  <!-- 2) CYJAN-Schild (links, kleine Akzentmarke) -->
  <g transform="translate(150, 200)">
    <path d="M 0 -75 L 58 -50 L 58 28 Q 58 78 0 110 Q -58 78 -58 28 L -58 -50 Z"
          fill="#0b1220" stroke="#0ea5e9" stroke-width="2.5"/>
    <!-- innere Hex-Andeutung -->
    <g opacity="0.35" stroke="#0ea5e9" stroke-width="0.8" fill="none">
      <polygon points="-22,-18 -8,-26 6,-18 6,-2 -8,6 -22,-2"/>
      <polygon points="6,-18 20,-26 34,-18 34,-2 20,6 6,-2"/>
      <polygon points="-22,-2 -8,6 6,-2 6,14 -8,22 -22,14"/>
      <polygon points="6,-2 20,6 34,-2 34,14 20,22 6,14"/>
    </g>
    <!-- Auge -->
    <ellipse cx="0" cy="20" rx="28" ry="10" fill="none" stroke="#0ea5e9" stroke-width="2"/>
    <circle  cx="0" cy="20" r="6" fill="#0ea5e9"/>
    <line x1="-46" y1="20" x2="-32" y2="20" stroke="#0ea5e9" stroke-width="2"/>
    <line x1="32"  y1="20" x2="46"  y2="20" stroke="#0ea5e9" stroke-width="2"/>
  </g>

  <!-- 3) CYJAN-Wortmarke -->
  <text x="225" y="248"
        font-family="Impact, 'Arial Narrow', 'Arial Black', sans-serif"
        font-size="118" font-weight="900" letter-spacing="3"
        fill="#0ea5e9">CYJAN</text>

  <!-- 4) Apothekerflasche (Mitte, dominant) -->
  <g transform="translate(640, 215)">
    <!-- weicher Schatten unter der Flasche -->
    <ellipse cx="0" cy="155" rx="82" ry="10" fill="#000" opacity="0.55"/>

    <!-- Korken -->
    <path d="M -26 -158 L 26 -158 L 28 -148 L 28 -134 L -28 -134 L -28 -148 Z" fill="url(#cork)"/>
    <ellipse cx="0" cy="-158" rx="26" ry="6" fill="#86552d"/>
    <!-- Korken-Wachs am Rand -->
    <path d="M -28 -135 Q -22 -128 0 -130 Q 22 -128 28 -135 L 28 -132 Q 14 -126 0 -127 Q -14 -126 -28 -132 Z"
          fill="#7c1d1d" opacity="0.85"/>

    <!-- Hals -->
    <path d="M -18 -134 L 18 -134 L 18 -100 L 32 -82 L 32 -62 L -32 -62 L -32 -82 L -18 -100 Z"
          fill="url(#glass)" stroke="url(#glassRim)" stroke-width="1.2"/>

    <!-- Schulter + Körper -->
    <path d="M -56 -62 L 56 -62 Q 64 -62 64 -52 L 64 110 Q 64 138 38 138 L -38 138 Q -64 138 -64 110 L -64 -52 Q -64 -62 -56 -62 Z"
          fill="url(#glass)" stroke="url(#glassRim)" stroke-width="1.2"/>

    <!-- Glasreflex links -->
    <path d="M -50 -50 Q -54 0 -52 90 L -45 90 Q -47 0 -43 -50 Z"
          fill="#ffffff" opacity="0.16"/>
    <!-- Glasreflex Hals -->
    <path d="M -14 -130 L -10 -130 L -12 -98 L -16 -82 L -22 -68 L -25 -68 Q -16 -90 -14 -130 Z"
          fill="#ffffff" opacity="0.12"/>

    <!-- Etikett -->
    <rect x="-46" y="-22" width="92" height="92" rx="3"
          fill="url(#label)" stroke="#6b4d22" stroke-width="0.9"/>
    <rect x="-42" y="-18" width="84" height="84" rx="2"
          fill="none" stroke="#3a2812" stroke-width="0.7"/>

    <!-- Totenkopf auf dem Etikett -->
    <g transform="translate(0, 8)">
      <path d="M -12 -2 Q -12 -14 0 -14 Q 12 -14 12 -2 L 12 6 Q 12 12 8 12 L 6 12 L 6 16 L 4 16 L 4 12 L -4 12 L -4 16 L -6 16 L -6 12 L -8 12 Q -12 12 -12 6 Z"
            fill="#1f1108"/>
      <ellipse cx="-4" cy="0" rx="2.4" ry="3.2" fill="#f0d9a8"/>
      <ellipse cx="4"  cy="0" rx="2.4" ry="3.2" fill="#f0d9a8"/>
      <path d="M -1.3 4 L 0 7 L 1.3 4" stroke="#f0d9a8" stroke-width="0.9" fill="none"/>
      <!-- gekreuzte Knochen -->
      <g stroke="#1f1108" stroke-width="2.4" stroke-linecap="round">
        <line x1="-15" y1="20" x2="15" y2="28"/>
        <line x1="-15" y1="28" x2="15" y2="20"/>
      </g>
      <!-- Knochen-Enden -->
      <g fill="#1f1108">
        <circle cx="-15" cy="20" r="2.2"/>
        <circle cx="-15" cy="28" r="2.2"/>
        <circle cx="15"  cy="20" r="2.2"/>
        <circle cx="15"  cy="28" r="2.2"/>
      </g>
    </g>

    <!-- Etikett-Text -->
    <text x="0" y="55" text-anchor="middle"
          font-family="'Cinzel', 'Times New Roman', serif"
          font-size="11" font-weight="700" letter-spacing="3"
          fill="#1f1108">CYANKALI</text>
    <text x="0" y="65" text-anchor="middle"
          font-family="'Cinzel', 'Times New Roman', serif"
          font-size="6" letter-spacing="2"
          fill="#3a2812">KCN · giftig</text>
  </g>

  <!-- 5) KALI-Wortmarke -->
  <text x="730" y="248"
        font-family="Impact, 'Arial Narrow', 'Arial Black', sans-serif"
        font-size="118" font-weight="900" letter-spacing="3"
        fill="#dc2626">KALI</text>

  <!-- 6) Kali-Emblem (rechts, roter Akzent): stilisierter Drachen-/
       Dämonen-Schädel als 3-Spike-Krone mit Auge. Bewusst nicht der
       trademarked Kali-Linux-Drache, sondern ein eigenes Wappen-Motiv,
       das die Aggressionsrolle an dem rechten Banner-Ende klar trägt. -->
  <g transform="translate(1130, 195)">
    <!-- Roter Glow -->
    <ellipse cx="0" cy="0" rx="85" ry="85" fill="url(#dragonGlow)"/>

    <g fill="#dc2626" stroke="#7f1d1d" stroke-width="0.8" stroke-linejoin="round">
      <!-- Drei Hörner / Krone -->
      <path d="M -46 -22 L -34 -68 L -22 -28 Z"/>
      <path d="M -10 -18 L  0 -82  L 10 -18 Z"/>
      <path d="M  22 -28 L  34 -68 L 46 -22 Z"/>

      <!-- Schädel-/Maskenkörper (sechseckig, kantig) -->
      <path d="M -50 -22
               L  50 -22
               L  62  -2
               L  44  30
               L  14  44
               L -14  44
               L -44  30
               L -62  -2 Z"/>

      <!-- Untere Kiefer-Spitze -->
      <path d="M -22 44 L 0 64 L 22 44 Z"/>
    </g>

    <!-- Auge: schmaler horizontaler Schlitz, einzeln, blickt aus dem Schädel -->
    <rect x="-22" y="2" width="44" height="9" rx="2" fill="#0b1220"/>
    <rect x="-22" y="2" width="44" height="9" rx="2" fill="none"
          stroke="#7f1d1d" stroke-width="0.8"/>
    <ellipse cx="0" cy="6.5" rx="6" ry="3" fill="#fee2e2"/>
    <circle cx="0" cy="6.5" r="2.2" fill="#0b1220"/>

    <!-- Zähne im Maskenmund -->
    <g fill="#fee2e2" opacity="0.95">
      <path d="M -16 24 L -12 36 L  -8 24 Z"/>
      <path d="M  -4 26 L   0 38 L   4 26 Z"/>
      <path d="M   8 24 L  12 36 L  16 24 Z"/>
    </g>
  </g>

  <!-- 7) Tagline -->
  <text x="640" y="358" text-anchor="middle"
        font-family="'Source Sans Pro', 'Helvetica Neue', sans-serif"
        font-size="19" letter-spacing="6"
        fill="#94a3b8">DEN WÄCHTER ANGREIFEN  ·  DEN ANGREIFER ERKENNEN</text>
</svg>

UI vesamenu.c32
MENU BACKGROUND splash.png
MENU TITLE Cyjan IDS
MENU COLOR title        * #00FFFFFF *
MENU COLOR border       * #00000000 #00000000 none
MENU COLOR sel          * #FF000000 #FF00CCCC *
MENU COLOR unsel        * #FFDDDDDD #00000000 *
MENU COLOR hotkey       * #FFFFFFFF *
TIMEOUT 100

LABEL live
  MENU LABEL Cyjan IDS - Starten (Live)
  KERNEL /live/vmlinuz
  APPEND initrd=/live/initrd boot=live components nomodeset consoleblank=0

LABEL install
  MENU LABEL Cyjan IDS - Auf Festplatte installieren
  KERNEL /live/vmlinuz
  APPEND initrd=/live/initrd boot=live components nomodeset consoleblank=0 ids.install=1

LABEL safe
  MENU LABEL Cyjan IDS - Safe Mode
  KERNEL /live/vmlinuz
  APPEND initrd=/live/initrd boot=live components nomodeset consoleblank=0 3

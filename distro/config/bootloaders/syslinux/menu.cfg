UI vesamenu.c32
MENU BACKGROUND splash.png
MENU TITLE Cyjan IDS
MENU COLOR title        * #FFFFFFFF *
MENU COLOR border       * #00000000 #00000000 none
MENU COLOR sel          * #FFFFFFFF #0066CCCC *
MENU COLOR unsel        * #DDDDDDDD #00000000 *
MENU COLOR hotkey       * #FFFFFFFF *
TIMEOUT 100

LABEL live
  MENU LABEL Cyjan IDS - Live starten
  KERNEL /live/vmlinuz
  APPEND initrd=/live/initrd boot=live components quiet splash

LABEL live-safe
  MENU LABEL Cyjan IDS - Safe Mode (nomodeset)
  KERNEL /live/vmlinuz
  APPEND initrd=/live/initrd boot=live components nomodeset

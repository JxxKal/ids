set default=0
set timeout=10

if background_image /boot/grub/splash.png; then
  set color_normal=white/black
  set color_highlight=black/white
fi

set menu_color_normal=cyan/black
set menu_color_highlight=black/cyan

menuentry "Cyjan IDS – Starten (Live)" {
  linux  /live/vmlinuz boot=live components nomodeset
  initrd /live/initrd
}

menuentry "Cyjan IDS – Auf Festplatte installieren" {
  linux  /live/vmlinuz boot=live components nomodeset ids.install=1
  initrd /live/initrd
}

menuentry "Cyjan IDS – Safe Mode" {
  linux  /live/vmlinuz boot=live components nomodeset 3
  initrd /live/initrd
}

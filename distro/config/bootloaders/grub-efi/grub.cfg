set default=0
set timeout=10

insmod all_video
insmod gfxterm
insmod png
set theme=

if background_image $prefix/splash.png; then
  set color_normal=white/black
  set color_highlight=black/white
fi

set menu_color_normal=cyan/black
set menu_color_highlight=black/cyan

menuentry "Cyjan IDS – Starten (Live)" {
  linux  /live/vmlinuz boot=live components nomodeset consoleblank=0
  initrd /live/initrd
}

menuentry "Cyjan IDS – Auf Festplatte installieren" {
  linux  /live/vmlinuz boot=live components nomodeset consoleblank=0 ids.install=1
  initrd /live/initrd
}

menuentry "Cyjan IDS – Safe Mode" {
  linux  /live/vmlinuz boot=live components nomodeset consoleblank=0 3
  initrd /live/initrd
}

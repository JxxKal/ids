# Cyjan IDS Remote-Tap – stripped-down Stack für Capture-Knoten an Außen-
# standorten oder vSwitch-Mirror-Ports.
#
# Lokal laufen: sniffer + flow-aggregator + signature-engine + Kafka.
# Erkannte Alerts werden vom tap-uplink-Service via mTLS-WSS an den
# Master forwarded. Lokal kein Postgres/Redis/MinIO/api/frontend.
#
# Bedienung:
#   docker compose -f docker-compose.tap.yml up -d        # alles starten
#   docker compose -f docker-compose.tap.yml logs -f      # live-Logs
#
# Konfiguration über /etc/cyjan/profile (vom Wizard `ids-setup` gefüllt):
#   MIRROR_INTERFACE   – physisches Interface mit dem Mirror-Traffic
#   MASTER_URL         – wss://master.example.com:8443/uplink
#   POSTGRES_PASSWORD  – nicht benötigt (kein lokales DB), muss aber gesetzt sein
#                        damit die env-Substitution nicht meckert.

# YAML-Anchor für Container-Log-Rotation. Greift pro Service via
# `logging: *default-logging`. Schützt gegen den Disk-Voll-Fall, der
# entsteht wenn ein Service in eine Retry-Schleife rennt (z.B. Sniffer
# vs. abgestürzter Kafka-Broker → MB/s an Fehler-Logs).
# Cap pro Container: 5 × 50 MB = 250 MB. Selbst ein Tag im Retry-Storm
# bleibt damit unter 1 GB pro Container.
x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

# Heartbeat-Healthcheck für die Python-Pipeline-Services: jeder Service
# touch't /tmp/heartbeat in seiner Hauptschleife (bzw. über einen Liveness-
# Thread/-Task, wo die Schleife legitim lange blockiert — training-loop,
# traffic-generator, mqtt-bridge). File älter als 120 s ⇒ unhealthy.
# start_period großzügig: die Consumer legen erst los, wenn Kafka healthy ist.
x-heartbeat-healthcheck: &heartbeat-check
  test: ["CMD", "python3", "-c", "import os,sys,time; sys.exit(0 if time.time()-os.stat('/tmp/heartbeat').st_mtime < 120 else 1)"]
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 120s

networks:
  tap-net:
    driver: bridge

volumes:
  kafka-data:
  signature-rules:                  # Per-Regel Overrides (sync vom Master)
  tap-cert:                         # /etc/cyjan/tap.{key,pem} + master-ca.pem
  tap-queue:                        # SQLite-Outage-Buffer
  tap-runtime:                      # geteilter Mount für state.json (uplink → api)

services:

  # ───────────────────────────────────────────────────────────────────────
  # Kafka – single-broker, klein konfiguriert. Bei Tap-Workloads ist die
  # Datenmenge klein (nur Pakete vom Mirror, kein DB-Backup, etc.), keine
  # 168h-Retention nötig: 24h ist mehr als genug.
  # ───────────────────────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:latest
    container_name: cyjan-tap-kafka
    restart: unless-stopped
    logging: *default-logging
    stop_grace_period: 30s
    networks: [tap-net]
    volumes:
      - kafka-data:/var/lib/kafka/data
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: controller,broker
      # PLAINTEXT (intern, zwischen Containern) + EXTERNAL (für den Sniffer
      # der mit network_mode:host läuft und nur über localhost:9094 zu uns
      # findet). CONTROLLER ist der KRaft-Quorum-Listener.
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: "24"
      # SAFETY-NET: byte-Cap pro Topic-Partition (broker-default). 2 GB.
      # Wenn Topic-Level-Retention aus init-script nicht greift oder Cleanup
      # hängt, droppt Kafka spätestens hier ältere Segmente. Reicht für ~20min
      # Worst-Case-raw-packets bei 19 kpps × 150 B = 2.85 MB/s × 600s = 1.7 GB.
      KAFKA_LOG_RETENTION_BYTES: "2147483648"
      # Cleanup-Check alle 30s statt Default 5 min. Bei Tap-Disk-Pressure ist
      # 5 min Cleanup-Lag der Unterschied zwischen "läuft eng" und "voll".
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: "30000"
      # Default-Segment-Size klein halten — Kafka kann nur ganze Segmente
      # droppen, große Segmente blockieren Cleanup länger.
      KAFKA_LOG_SEGMENT_BYTES: "134217728"
      # MUSS auf den Volume-Mountpunkt zeigen — apache/kafka-Default ist
      # /tmp/kraft-combined-logs, was im Container-Writable-Layer landet
      # und auf einem 32-GB-Tap die Disk innerhalb eines Tages füllt.
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_CLUSTER_ID: "Q3lqYW5UYXBLYWZrYUNsdXM"
    ports:
      - "127.0.0.1:9094:9094"   # nur localhost – host-network-Sniffer reicht
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  kafka-init:
    image: apache/kafka:latest
    container_name: cyjan-tap-kafka-init
    networks: [tap-net]
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./infra/kafka/init-topics-tap.sh:/init-topics.sh:ro
    entrypoint: ["/bin/bash", "/init-topics.sh"]
    restart: "no"

  # ───────────────────────────────────────────────────────────────────────
  # SNIFFER – braucht NET_ADMIN + NET_RAW + Host-Network um den Mirror-Port
  # mitzuhören. Identisches Image wie auf dem Master.
  # ───────────────────────────────────────────────────────────────────────
  sniffer:
    build: ./sniffer
    container_name: cyjan-tap-sniffer
    restart: unless-stopped
    logging: *default-logging
    network_mode: host           # AF_PACKET will den realen NIC sehen
    cap_add: [NET_ADMIN, NET_RAW]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      # network_mode: host → Sniffer ist auf der Host-Loopback und erreicht
      # Kafka über den EXTERNAL-Listener auf 9094. MIRROR_IFACE-Env muss
      # exakt den Namen treffen den der Rust-Code liest.
      KAFKA_BROKERS: localhost:9094
      MIRROR_IFACE: ${MIRROR_INTERFACE:?MIRROR_INTERFACE muss in /etc/cyjan/profile gesetzt sein}
      CAPTURE_SNAPLEN: ${CAPTURE_SNAPLEN:-128}
      CAPTURE_RING_BUFFER_MB: ${CAPTURE_RING_BUFFER_MB:-64}
      TEST_MODE: "false"
      RUST_LOG: info
    volumes:
      - /sys:/host/sys:ro

  # ───────────────────────────────────────────────────────────────────────
  # Detection-Pipeline (lokal): flow-aggregator → signature-engine
  # ML-Engine ist bewusst NICHT dabei – das Modell sitzt am Master.
  # ───────────────────────────────────────────────────────────────────────
  flow-aggregator:
    build: ./flow-aggregator
    container_name: cyjan-tap-flow-aggregator
    healthcheck: *heartbeat-check
    restart: unless-stopped
    logging: *default-logging
    networks: [tap-net]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092

  signature-engine:
    build: ./signature-engine
    container_name: cyjan-tap-signature-engine
    healthcheck: *heartbeat-check
    restart: unless-stopped
    logging: *default-logging
    networks: [tap-net]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      RULES_DIR: /rules
      # Phase-2 Shadow-Metrik. tap-uplink konsumiert das gleichnamige Topic
      # und forwardet die Records via mTLS-WSS an den Master.
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      METRICS_TOPIC:  ${METRICS_TOPIC:-rule-metrics}
      METRICS_SAMPLING_RATE: ${METRICS_SAMPLING_RATE:-0.01}
      # Self-Traffic-Filter (analog Master-Compose): Tap-eigene IPs/CIDRs.
      # Verhindert dass tap-uplink-Heartbeats (HTTPS zum Master) als
      # ML-Anomaly oder als IRMA-Beacon-Pattern auftauchen.
      IDS_OWN_IPS: ${IDS_OWN_IPS:-}
    volumes:
      # Wird vom tap-uplink-Container via Reverse-Channel-Pull gefüllt.
      # /rules/builtin/*.yml und /rules/custom/_overrides.json kommen vom
      # Master alle 5 min; signature-engine reagiert mit inotify.
      - signature-rules:/rules

  # ───────────────────────────────────────────────────────────────────────
  # tap-uplink – konsumiert lokales alerts-raw, forwardet an den Master
  # via mTLS-WSS. Cert-Material in /etc/cyjan (vom Wizard gepairt).
  # ───────────────────────────────────────────────────────────────────────
  tap-uplink:
    build: ./tap-uplink
    container_name: cyjan-tap-uplink
    healthcheck: *heartbeat-check
    restart: unless-stopped
    logging: *default-logging
    networks: [tap-net]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      ALERTS_TOPIC: alerts-raw
      METRICS_TOPIC: rule-metrics
      KAFKA_GROUP_ID: tap-uplink
      # PCAP-Side V1: tap-uplink hält in-memory einen ±60s-Ringbuffer
      # aus pcap-headers, baut bei Tap-Alerts das PCAP-File und schickt
      # es als pcap_upload-Frame über die mTLS-WSS. PCAP_WINDOW_S muss
      # konsistent mit dem Master-Setting sein, damit Tap- und Master-
      # Alerts vergleichbare PCAPs liefern.
      PCAP_TOPIC:    pcap-headers
      PCAP_WINDOW_S: ${PCAP_WINDOW_S:-60}
      MASTER_URL: ${MASTER_URL:-wss://master.example.com:8443/uplink}
      TAP_CERT:  /etc/cyjan/tap.pem
      TAP_KEY:   /etc/cyjan/tap.key
      MASTER_CA: /etc/cyjan/master-ca.pem
      QUEUE_PATH: /var/lib/cyjan/uplink-queue.db
      QUEUE_MAX_GB: "1.0"
      STATE_PATH: /run/cyjan/tap-uplink.state.json
      RULES_DIR: /rules
      CONFIG_POLL_INTERVAL_S: "300"
      LOG_LEVEL: INFO
    volumes:
      - tap-cert:/etc/cyjan
      - tap-queue:/var/lib/cyjan
      - tap-runtime:/run/cyjan
      # signature-rules-Volume RW: tap-uplink schreibt hier die vom Master
      # gepullten Builtin-YAMLs + Custom-Overrides rein, signature-engine
      # liest read-only daraus.
      - signature-rules:/rules
      # /opt/ids/VERSION: Tap-Wizard schreibt hier die installierte Version
      # rein, cyjan-tap update --from-master überschreibt es nach jedem Pull.
      # tap-uplink schickt den Inhalt als hello-Frame an master-uplink, damit
      # die Master-UI pro Tap die laufende Version sieht. Read-only Mount.
      - /opt/ids/VERSION:/etc/cyjan/version:ro
      # Update-Trigger-Bind-Mount: tap-uplink schreibt hier ein Trigger-
      # File rein wenn der Master via WebSocket "update_now" sendet. Auf
      # dem Host watcht cyjan-tap-update.path systemd-Unit dieses File und
      # ruft `cyjan-tap update --from-master -y` auf — host-side, weil
      # der Container kein docker socket hat und Self-Restart sonst nicht
      # funktioniert.
      - /run/cyjan-update:/host/cyjan-update:rw

  # ───────────────────────────────────────────────────────────────────────
  # tap-api – minimaler Status/Konfig-Web-View + Maschinen-Endpunkte für
  # die `cyjan-tap`-CLI. Liest tap-uplink.state.json, kein eigener Auth-Stack.
  # ───────────────────────────────────────────────────────────────────────
  tap-api:
    build: ./tap-api
    container_name: cyjan-tap-api
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; socket.create_connection(('127.0.0.1',8000),5).close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    logging: *default-logging
    networks: [tap-net]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      ALERTS_TOPIC: alerts-raw
      MASTER_URL: ${MASTER_URL:-}
      MIRROR_IFACE: ${MIRROR_INTERFACE:-}
      TAP_CERT: /etc/cyjan/tap.pem
      STATE_PATH: /run/cyjan/tap-uplink.state.json
      LOG_LEVEL: INFO
    volumes:
      - tap-cert:/etc/cyjan                 # pair-Endpoint schreibt hier rein
      - tap-runtime:/run/cyjan:ro
      # /api/load liefert CPU/RAM/Disk/Mirror-Iface/Sniffer-Stats für die
      # CLI (`cyjan-tap load`). /proc + /sys vom Host für die Ressourcen-
      # Werte, docker.sock für `docker logs cyjan-tap-sniffer`.
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${TAP_UI_BIND:-127.0.0.1}:${TAP_UI_PORT:-8001}:8000"

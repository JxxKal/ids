name: Build Cyjan IDS Release

# Single Workflow für ISO + Update-Paket: ein gemeinsamer Image-Build-Schritt
# füttert beide nachgeschalteten Jobs.
#
# Tag-Pattern entscheidet was gebaut wird:
#   • vN.0.0   (Major-Release, z.B. v2.0.0)  → ISO + Update-Paket
#   • alle anderen vN.M.P                    → NUR Update-Paket
#
# Hintergrund: ISO-Build dauert 25–30 min und lohnt sich nur wenn Wizard,
# Installer, Distro-Pakete oder Boot-Hooks geändert wurden – also genau die
# Stellen die historisch zu Major-Bumps führen. Reine App-/Compose-/API-
# Fixes brauchen kein neues ISO; das Update-ZIP über Settings → System-
# Update reicht. Siehe CLAUDE.md → ISO Build.
#
# Wer trotzdem mal ein ISO braucht ohne Major-Tag (z.B. zum manuellen
# Testen vor v2.0.0): workflow_dispatch mit `build_iso=true` triggern.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_iso:
        description: 'ISO(s) mit bauen? (Default: nur Update-Paket)'
        type: boolean
        default: false
      image_kind:
        description: 'Welche ISO-Variante? (master, tap, both) – wirkt nur bei build_iso=true. Tag-Push baut immer beide.'
        type: choice
        default: both
        options: [master, tap, both]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Alle Custom-Images (ids-*) bauen + externe Runtime-Images (timescaledb,
  # kafka, redis, minio, kafka-ui) ziehen, gemeinsam in einen tarball
  # exportieren. Output-Artefakt: docker-images/images.tar.gz
  # ──────────────────────────────────────────────────────────────────────────
  build-images:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Layer-Cache wiederherstellen
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: zstd installieren
        run: sudo apt-get install -y --no-install-recommends zstd

      - name: ids-Images bauen + externe Images ziehen
        shell: bash
        env:
          COMPOSE_PROJECT_NAME: ids
          POSTGRES_PASSWORD: build-placeholder
          MIRROR_IFACE: eth1
          MIRROR_INTERFACE: eth1
          MASTER_URL: wss://placeholder.example/uplink
        run: |
          set -euo pipefail

          # 1) Alle Master-Profile-Custom-Images bauen (prod + snort).
          docker compose --profile prod --profile snort build \
            --build-arg BUILDKIT_INLINE_CACHE=1

          # 2) Tap-spezifische Custom-Images bauen. Geteilte Services (sniffer,
          #    flow-aggregator, signature-engine) sind aus Schritt 1 schon
          #    da; tap-uplink + tap-api kommen jetzt dazu.
          docker compose -f docker-compose.tap.yml build \
            --build-arg BUILDKIT_INLINE_CACHE=1

          # Externe Runtime-Images für den Master.
          EXTERNALS_MASTER=(
            timescale/timescaledb:latest-pg16
            redis:7-alpine
            apache/kafka:latest
            minio/minio:latest
            minio/mc:latest
            provectuslabs/kafka-ui:latest
          )
          # Externe Runtime-Images für den Tap. Nur Kafka – keine DB, kein Redis,
          # kein MinIO, keine Web-UI – am Tap läuft alles in-memory + lokal.
          EXTERNALS_TAP=(
            apache/kafka:latest
          )

          for img in "${EXTERNALS_MASTER[@]}"; do
            docker pull "$img"
          done

          # Master-Bundle (Custom + Externe Master).
          # rule-tuner: Phase-4-Service (ML-Threshold-Anpassung), seit v1.5.0
          # Master-only. Vorher fehlte er hier — Update-ZIPs ohne rule-tuner
          # ließen die Reservoir-/Tuning-Pipeline auf der Zielmaschine ohne
          # Container.
          CUSTOM_MASTER=(api frontend flow-aggregator signature-engine ml-engine \
                         alert-manager enrichment-service pcap-store training-loop \
                         sniffer irma-bridge snort snort-bridge master-uplink \
                         rule-tuner)

          IMAGES_MASTER=()
          for svc in "${CUSTOM_MASTER[@]}"; do
            img="ids-${svc}"
            if docker image inspect "$img" >/dev/null 2>&1; then
              IMAGES_MASTER+=("$img")
              echo "  master ✓ $img"
            else
              echo "  master · $img nicht gebaut – übersprungen"
            fi
          done
          IMAGES_MASTER+=("${EXTERNALS_MASTER[@]}")

          echo "Master-Bundle: ${#IMAGES_MASTER[@]} Images"
          docker save "${IMAGES_MASTER[@]}" \
            | zstd -19 -T0 --long=27 -o images-master.tar.zst
          echo "  → $(du -sh images-master.tar.zst | cut -f1)"

          # Tap-Bundle (Custom-Tap + Externe Tap). Bewusst minimaler Image-Set
          # damit das Tap-ISO unter ~600 MB bleibt. tap-uplink + tap-api +
          # die Detection-Pipeline-Services + das einzige nötige externe Image
          # (Kafka).
          CUSTOM_TAP=(sniffer flow-aggregator signature-engine tap-uplink tap-api)

          IMAGES_TAP=()
          for svc in "${CUSTOM_TAP[@]}"; do
            img="ids-${svc}"
            if docker image inspect "$img" >/dev/null 2>&1; then
              IMAGES_TAP+=("$img")
              echo "  tap    ✓ $img"
            else
              echo "  tap    · $img nicht gebaut – übersprungen"
            fi
          done
          IMAGES_TAP+=("${EXTERNALS_TAP[@]}")

          echo "Tap-Bundle: ${#IMAGES_TAP[@]} Images"
          docker save "${IMAGES_TAP[@]}" \
            | zstd -19 -T0 --long=27 -o images-tap.tar.zst
          echo "  → $(du -sh images-tap.tar.zst | cut -f1)"

      - name: Master-Bundle hochladen
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-master
          path: images-master.tar.zst
          retention-days: 7

      - name: Tap-Bundle hochladen
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-tap
          path: images-tap.tar.zst
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # ISO bauen mit eingebettetem Image-Bundle.
  #
  # Läuft nur wenn:
  #   • das gepushte Tag auf .0.0 endet (Major-Release), ODER
  #   • workflow_dispatch mit build_iso=true manuell getriggert wurde.
  # Sonst stoppt der Workflow nach build-images bei build-update-package.
  # ──────────────────────────────────────────────────────────────────────────
  build-iso:
    needs: build-images
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.build_iso && inputs.image_kind != 'tap') ||
      (github.event_name == 'push' && (endsWith(github.ref_name, '.0.0') || contains(github.ref_name, '-iso')))
    runs-on: ubuntu-24.04
    # Debian Bookworm Container: live-build unterstützt hier alle Optionen.
    # --privileged ist zwingend – lb build mountet Filesysteme im Chroot.
    container:
      image: debian:bookworm
      options: --privileged
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Tags holen damit git describe die richtige Version findet

      - name: System-Abhängigkeiten installieren
        shell: bash
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            live-build debootstrap squashfs-tools xorriso \
            isolinux syslinux-common grub-efi-amd64-bin grub-pc-bin \
            mtools dosfstools ca-certificates git curl
          echo "live-build: $(lb --version)"
          df -h /

      - name: Image-Bundle aus build-images-Job herunterladen
        uses: actions/download-artifact@v4
        with:
          name: docker-images-master
          path: artifacts/

      - name: Bundle in includes.chroot legen
        shell: bash
        run: |
          set -euo pipefail
          # NICHT nach /opt/ids/offline-images: dort macht 0200-ids.hook.chroot
          # später `git clone` und bricht ab, wenn das Verzeichnis nicht leer ist.
          DST="${GITHUB_WORKSPACE}/distro/config/includes.chroot/opt/cyjan-offline"
          mkdir -p "$DST"
          mv artifacts/images-master.tar.zst "$DST/images.tar.zst"
          ls -lh "$DST/images.tar.zst"

      - name: Konfigurieren, Bauen und ISO sichern
        id: build
        shell: bash
        run: |
          set -euo pipefail
          LOG="${GITHUB_WORKSPACE}/build.log"
          touch "$LOG"

          log() { echo "$*" | tee -a "$LOG"; }

          log "=== Version-Marker schreiben ==="
          VERSION=$(git -C "${GITHUB_WORKSPACE}" describe --tags --always 2>/dev/null || echo "dev")
          BUILD_TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BUILD_COMMIT=$(git -C "${GITHUB_WORKSPACE}" rev-parse HEAD 2>/dev/null || echo "?")
          mkdir -p "${GITHUB_WORKSPACE}/distro/config/includes.chroot/etc"
          {
            echo "VERSION=${VERSION}"
            echo "BUILD_TS=${BUILD_TS}"
            echo "BUILD_COMMIT=${BUILD_COMMIT}"
          } > "${GITHUB_WORKSPACE}/distro/config/includes.chroot/etc/cyjan-version"
          cat "${GITHUB_WORKSPACE}/distro/config/includes.chroot/etc/cyjan-version" | tee -a "$LOG"

          log "=== lb config ==="
          cd "${GITHUB_WORKSPACE}/distro"
          cat auto/config | tee -a "$LOG"
          lb config 2>&1 | tee -a "$LOG"

          log "=== lb config/binary ==="
          cat config/binary 2>/dev/null | tee -a "$LOG" || true

          log "=== lb build ==="
          lb build 2>&1 | tee -a "$LOG"

          ISO=$(ls live-image-amd64.hybrid.iso *.iso 2>/dev/null | head -1 || true)
          if [ -z "$ISO" ]; then
            log "FEHLER: Keine ISO-Datei gefunden"
            ls -la | tee -a "$LOG"
            exit 1
          fi

          VERSION=$(git -C "${GITHUB_WORKSPACE}" describe --tags --always 2>/dev/null || echo "dev")
          ISO_NAME="cyjan-ids-${VERSION}.iso"
          ISO_LATEST="cyjan-ids-latest.iso"
          cp "$ISO" "${GITHUB_WORKSPACE}/${ISO_NAME}"
          cp "$ISO" "${GITHUB_WORKSPACE}/${ISO_LATEST}"
          echo "iso_name=${ISO_NAME}" >> "$GITHUB_OUTPUT"
          echo "iso_latest=${ISO_LATEST}" >> "$GITHUB_OUTPUT"
          log "ISO: ${ISO_NAME} ($(du -sh "${GITHUB_WORKSPACE}/${ISO_NAME}" | cut -f1))"
          log "ISO-Alias: ${ISO_LATEST} (stabiler Permalink)"

      - name: Build-Log hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn
          retention-days: 7

      - name: ISO als Artefakt hochladen
        if: steps.build.outputs.iso_name != ''
        uses: actions/upload-artifact@v4
        with:
          name: cyjan-ids-iso
          path: ${{ steps.build.outputs.iso_name }}
          retention-days: 30

      - name: GitHub Release erstellen (bei Tag-Push)
        if: startsWith(github.ref, 'refs/tags/v') && steps.build.outputs.iso_name != ''
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.build.outputs.iso_name }}
            ${{ steps.build.outputs.iso_latest }}
          body: |
            ## Cyjan IDS ${{ github.ref_name }}

            Live-ISO mit integriertem Disk-Installer und **vorgeladenen Docker-
            Images** (~1,5 GB Bundle im squashfs). Erste Inbetriebnahme braucht
            kein Internet — der First-Boot-Wizard lädt die Images per
            `docker load`, baut **nichts** auf der Zielmaschine und startet den
            Stack innerhalb von 1–2 Minuten.

            ### Installation

            1. ISO auf USB-Stick schreiben:
               ```bash
               sudo dd if=${{ steps.build.outputs.iso_name }} of=/dev/sdX bs=4M status=progress conv=fsync
               ```
            2. Vom USB booten (UEFI oder Legacy/BIOS).
            3. Boot-Menü → **"Cyjan IDS – Auf Festplatte installieren"** (Default nach 5 s).
            4. Zielfestplatte wählen – ≥ 20 GB, alle Daten werden gelöscht.
            5. Nach dem Reboot vom internen Datenträger startet der First-Boot-Wizard
               automatisch auf der Konsole.

            ### Offline-fähig
            Solange das Bundle unter `/opt/cyjan-offline/images.tar.gz` liegt
            (per Default ja), läuft der gesamte First-Boot ohne Netzwerk. Updates
            später über `sudo ids-update` oder über das Web-Interface (System-
            Update mit dem `cyjan-ids-update-<tag>.zip` aus diesem Release).

            ### First-Boot-Wizard konfiguriert
            - Proxy (HTTP/HTTPS/No-Proxy) für spätere Updates und Docker-Pulls
            - Management- und Mirror/SPAN-Interface (Auswahl aus Live-NIC-Liste)
            - Optional: statische IP statt DHCP
            - Postgres-Passwort, JWT-Secret, MinIO-Credentials
            - Systembenutzer-Passwörter für `ids` (Console/SSH) und `root` (sudo)
            - IRMA-Integration (REST-Poll, optional)
            - Suricata-Profil (optional)

            ### Erstanmeldung
            - Web-Interface: `http://<management-ip>/`
            - API / Swagger: `http://<management-ip>:8001/api/docs`
            - Default-Login: **`admin` / `admin-change-me`** → sofort ändern.

            ### Update nach Installation
            Zwei Pfade, je nach Internetzugang:

            * **Online (Konsole)**: `sudo ids-update` auf der Maschine →
              `git pull` aus diesem Repo, dann `docker compose build` + `up -d`
              für betroffene Services.
            * **Offline (Web-GUI)**: `cyjan-ids-update-${{ github.ref_name }}.zip`
              herunterladen und in der Frontend-Oberfläche unter
              **Settings → System-Update** hochladen. Die API extrahiert das
              ZIP, lädt das Bundle via `docker load` und startet die
              Container neu – kein Internet-Zugang notwendig.

            ### Konfiguration nachträglich ändern
            ```bash
            sudo ids-setup           # Wizard erneut, .env wird überschrieben
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}

  # ──────────────────────────────────────────────────────────────────────────
  # Tap-ISO: gleiche Live-Build-Basis wie Master, aber kleineres Image-Bundle
  # (nur Tap-Services + Kafka) und /etc/cyjan/mode=tap als Marker, damit der
  # Wizard beim ersten Boot direkt Tap als Default vorschlägt.
  #
  # Hostname: cyjan-tap (statt cyjan-ids beim Master) – macht im DHCP-Lease
  # und auf der Konsole sofort sichtbar dass es ein Tap ist.
  # ──────────────────────────────────────────────────────────────────────────
  build-iso-tap:
    needs: build-images
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.build_iso && inputs.image_kind != 'master') ||
      (github.event_name == 'push' && (endsWith(github.ref_name, '.0.0') || contains(github.ref_name, '-iso')))
    runs-on: ubuntu-24.04
    container:
      image: debian:bookworm
      options: --privileged
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: System-Abhängigkeiten installieren
        shell: bash
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            live-build debootstrap squashfs-tools xorriso \
            isolinux syslinux-common grub-efi-amd64-bin grub-pc-bin \
            mtools dosfstools ca-certificates git curl
          echo "live-build: $(lb --version)"
          df -h /

      - name: Tap-Image-Bundle herunterladen
        uses: actions/download-artifact@v4
        with:
          name: docker-images-tap
          path: artifacts/

      - name: Tap-Bundle + Mode-Marker in chroot legen
        shell: bash
        run: |
          set -euo pipefail
          DST="${GITHUB_WORKSPACE}/distro/config/includes.chroot/opt/cyjan-offline"
          mkdir -p "$DST"
          # Bundle bewusst unter dem gleichen Dateinamen ablegen wie das
          # Master-Bundle. ids-setup sucht /opt/cyjan-offline/images.tar.zst
          # – wir nehmen den Tap-Inhalt und stellen ihn als 'images.tar.zst'
          # bereit, damit der Wizard-Code identisch bleibt.
          mv artifacts/images-tap.tar.zst "$DST/images.tar.zst"
          ls -lh "$DST/images.tar.zst"

          # /etc/cyjan/mode=tap → cyjan-stack-up startet docker-compose.tap.yml,
          # ids-setup defaultet auf Rolle 'tap' beim ersten Lauf.
          ETC="${GITHUB_WORKSPACE}/distro/config/includes.chroot/etc/cyjan"
          mkdir -p "$ETC"
          echo "tap" > "$ETC/mode"
          echo "tap" > "$ETC/iso-kind"

          # Hostname für eine Tap-ISO – beim Master heißt es 'cyjan-ids'.
          echo "cyjan-tap" > "${GITHUB_WORKSPACE}/distro/config/includes.chroot/etc/hostname"

      - name: Konfigurieren, Bauen und ISO sichern
        id: build
        shell: bash
        run: |
          set -euo pipefail
          LOG="${GITHUB_WORKSPACE}/build.log"
          touch "$LOG"
          log() { echo "$*" | tee -a "$LOG"; }

          log "=== Version-Marker schreiben (Tap-Variante) ==="
          VERSION=$(git -C "${GITHUB_WORKSPACE}" describe --tags --always 2>/dev/null || echo "dev")
          BUILD_TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BUILD_COMMIT=$(git -C "${GITHUB_WORKSPACE}" rev-parse HEAD 2>/dev/null || echo "?")
          mkdir -p "${GITHUB_WORKSPACE}/distro/config/includes.chroot/etc"
          {
            echo "VERSION=${VERSION}"
            echo "BUILD_TS=${BUILD_TS}"
            echo "BUILD_COMMIT=${BUILD_COMMIT}"
            echo "ISO_KIND=tap"
          } > "${GITHUB_WORKSPACE}/distro/config/includes.chroot/etc/cyjan-version"
          cat "${GITHUB_WORKSPACE}/distro/config/includes.chroot/etc/cyjan-version" | tee -a "$LOG"

          log "=== lb config (Tap) ==="
          cd "${GITHUB_WORKSPACE}/distro"
          lb config 2>&1 | tee -a "$LOG"

          log "=== lb build (Tap) ==="
          lb build 2>&1 | tee -a "$LOG"

          ISO=$(ls live-image-amd64.hybrid.iso *.iso 2>/dev/null | head -1 || true)
          if [ -z "$ISO" ]; then
            log "FEHLER: Keine Tap-ISO-Datei gefunden"
            ls -la | tee -a "$LOG"
            exit 1
          fi

          ISO_NAME="cyjan-ids-tap-${VERSION}.iso"
          ISO_LATEST="cyjan-ids-tap-latest.iso"
          cp "$ISO" "${GITHUB_WORKSPACE}/${ISO_NAME}"
          cp "$ISO" "${GITHUB_WORKSPACE}/${ISO_LATEST}"
          echo "iso_name=${ISO_NAME}" >> "$GITHUB_OUTPUT"
          echo "iso_latest=${ISO_LATEST}" >> "$GITHUB_OUTPUT"
          log "Tap-ISO: ${ISO_NAME} ($(du -sh "${GITHUB_WORKSPACE}/${ISO_NAME}" | cut -f1))"

      - name: Tap-Build-Log hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-tap
          path: build.log
          if-no-files-found: warn
          retention-days: 7

      - name: Tap-ISO als Artefakt hochladen
        if: steps.build.outputs.iso_name != ''
        uses: actions/upload-artifact@v4
        with:
          name: cyjan-ids-tap-iso
          path: ${{ steps.build.outputs.iso_name }}
          retention-days: 30

      - name: Tap-ISO an Release anhängen (bei Tag-Push)
        if: startsWith(github.ref, 'refs/tags/v') && steps.build.outputs.iso_name != ''
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.build.outputs.iso_name }}
            ${{ steps.build.outputs.iso_latest }}
          append_body: true
          body: |

            ---

            ## Cyjan IDS Tap-ISO ${{ github.ref_name }}

            Schmaler Live-ISO-Build für **Remote-Capture-Knoten**. Enthält nur
            die Tap-Pipeline (sniffer + flow-aggregator + signature-engine +
            tap-uplink + tap-api + Kafka) – kein Postgres, kein MinIO, kein
            Frontend.

            Das ISO setzt `/etc/cyjan/mode=tap` voraus, der Wizard defaultet
            damit auf die Tap-Rolle. User wird beim ersten Boot abgefragt:
            • Master-API-URL (https://master.lan:8001)
            • Mirror-Interface (vom physischen NIC)
            • Pairing-Token (vorher im Master-Frontend unter Settings →
              Remote Taps generiert; einmalig 60min gültig)

            Nach Wizard-Abschluss baut sich der Tap automatisch eine eigene
            mTLS-Identität mit dem Master-CA, hält einen WebSocket auf
            wss://master:8443 und schickt erkannte Alerts persistent dorthin.

            Größenordnung: ~600 MB ISO (vs. ~1.5 GB Master). VM-Profil:
            2 vCPU, 2 GB RAM, 16 GB Disk reichen.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}

  # ──────────────────────────────────────────────────────────────────────────
  # Update-Paket: gleiches Bundle + compose.yml + infra/, ohne ISO drumrum.
  # Wird über Settings → System-Update eingespielt.
  # ──────────────────────────────────────────────────────────────────────────
  build-update-package:
    needs: build-images
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Master-Bundle herunterladen
        uses: actions/download-artifact@v4
        with:
          name: docker-images-master

      - name: Tap-Bundle herunterladen
        uses: actions/download-artifact@v4
        with:
          name: docker-images-tap
          path: tap-artifacts/

      - name: Update-Paket zusammenstellen
        shell: bash
        run: |
          set -euo pipefail
          # Tag bevorzugt, sonst commit-SHA, sonst Inhalt von VERSION.
          VERSION="${GITHUB_REF_NAME}"
          [[ "$VERSION" =~ ^v ]] || VERSION=$(git describe --tags --always 2>/dev/null || cat VERSION)

          PKG="cyjan-ids-update-${VERSION}"
          mkdir -p "$PKG"

          cp docker-compose.yml     "$PKG/"
          cp docker-compose.tap.yml "$PKG/"
          cp VERSION                "$PKG/"
          cp .env.example           "$PKG/"
          cp -r infra/              "$PKG/infra/"

          # post-update.sh: optionale Host-Wartung, die der API-Update-Container
          # nicht selbst ausführen kann (greift auf /etc/docker/ und systemd zu).
          # User wird nach erfolgreichem GUI-Update einmal manuell zur sudo-
          # Ausführung aufgefordert. Idempotent — re-runs sind unschädlich.
          mkdir -p "$PKG/scripts"
          cp distro/config/includes.chroot/etc/docker/daemon.json                    "$PKG/scripts/daemon.json"
          cp distro/config/includes.chroot/usr/local/bin/cyjan-maintenance           "$PKG/scripts/cyjan-maintenance"
          cp distro/config/includes.chroot/etc/systemd/system/cyjan-maintenance.service "$PKG/scripts/cyjan-maintenance.service"
          cp distro/config/includes.chroot/etc/systemd/system/cyjan-maintenance.timer   "$PKG/scripts/cyjan-maintenance.timer"
          cp distro/config/includes.chroot/usr/local/bin/cyjan-mirror-tune                "$PKG/scripts/cyjan-mirror-tune"
          cp distro/config/includes.chroot/etc/systemd/system/cyjan-mirror-tune.service  "$PKG/scripts/cyjan-mirror-tune.service"
          cp scripts/post-update.sh "$PKG/scripts/post-update.sh"
          chmod +x "$PKG/scripts/post-update.sh" "$PKG/scripts/cyjan-maintenance" "$PKG/scripts/cyjan-mirror-tune"

          # Bundle bewusst als 'images.tar.zst' ablegen – die System-Update-
          # Pipeline der API erwartet genau diesen Dateinamen.
          mv images-master.tar.zst "$PKG/images.tar.zst"

          # ── Tap-Update-Subdir ─────────────────────────────────────────
          # Layout entspricht dem, was master-uplink unter /tap-update/<file>
          # ausliefert (siehe master-uplink _TAP_UPDATE_FILES). Tap zieht das
          # via `cyjan-tap update --from-master` über mTLS ab.
          mkdir -p "$PKG/tap-update/scripts"
          mv tap-artifacts/images-tap.tar.zst "$PKG/tap-update/images-tap.tar.zst"
          cp docker-compose.tap.yml            "$PKG/tap-update/docker-compose.tap.yml"
          cp "$PKG/scripts/post-update.sh"             "$PKG/tap-update/scripts/post-update.sh"
          cp "$PKG/scripts/daemon.json"                "$PKG/tap-update/scripts/daemon.json"
          cp "$PKG/scripts/cyjan-maintenance"          "$PKG/tap-update/scripts/cyjan-maintenance"
          cp "$PKG/scripts/cyjan-maintenance.service"  "$PKG/tap-update/scripts/cyjan-maintenance.service"
          cp "$PKG/scripts/cyjan-maintenance.timer"    "$PKG/tap-update/scripts/cyjan-maintenance.timer"
          cp "$PKG/scripts/cyjan-mirror-tune"          "$PKG/tap-update/scripts/cyjan-mirror-tune"
          cp "$PKG/scripts/cyjan-mirror-tune.service"  "$PKG/tap-update/scripts/cyjan-mirror-tune.service"

          BUNDLE_SHA=$(sha256sum "$PKG/tap-update/images-tap.tar.zst" | awk '{print $1}')
          BUNDLE_SIZE=$(stat -c%s "$PKG/tap-update/images-tap.tar.zst")
          COMPOSE_SHA=$(sha256sum "$PKG/tap-update/docker-compose.tap.yml" | awk '{print $1}')
          BUILD_TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          cat > "$PKG/tap-update/manifest.json" <<MANIFEST
          {
            "version": "${VERSION}",
            "created_at": "${BUILD_TS}",
            "bundle": {
              "file":   "images-tap.tar.zst",
              "sha256": "${BUNDLE_SHA}",
              "size":   ${BUNDLE_SIZE}
            },
            "compose": {
              "file":   "docker-compose.tap.yml",
              "sha256": "${COMPOSE_SHA}"
            }
          }
          MANIFEST

          echo "Tap-Update-Bundle:"
          echo "  Version:    ${VERSION}"
          echo "  Bundle:     $(du -sh "$PKG/tap-update/images-tap.tar.zst" | cut -f1)"
          echo "  SHA256:     ${BUNDLE_SHA}"

          # GeoIP-/ASN-Lite-DBs von DB-IP mit reinpacken, damit Offline-Hosts
          # nach jedem Update frische Geo-Daten haben (DB-IP veröffentlicht am
          # 1. eines jeden Monats unter download.db-ip.com/free).
          # Der enrichment-service erwartet die Dateien als
          # GeoLite2-{City,ASN}.mmdb in /opt/ids/geoip/. Die System-Update-API
          # extrahiert das ZIP nach /opt/ids und restartet alle Services →
          # enrichment-service lädt die neuen Dateien automatisch.
          # Failsoft: wenn DB-IP nicht erreichbar ist (CI-Netz-Hiccup, Lite-
          # Endpoint-Wechsel), bauen wir das Update trotzdem — der Settings-
          # Upload-Pfad bleibt als Fallback.
          mkdir -p "$PKG/geoip"
          GEOIP_OK=0
          for MO in $(date -u +%Y-%m) $(date -u -d '1 month ago' +%Y-%m) $(date -u -d '2 months ago' +%Y-%m); do
            URL_CITY="https://download.db-ip.com/free/dbip-city-lite-${MO}.mmdb.gz"
            URL_ASN="https://download.db-ip.com/free/dbip-asn-lite-${MO}.mmdb.gz"
            if curl -sfI "$URL_CITY" >/dev/null && curl -sfI "$URL_ASN" >/dev/null; then
              echo "GeoIP-Stand: DB-IP Lite $MO"
              curl -sf -o /tmp/city.mmdb.gz "$URL_CITY"
              curl -sf -o /tmp/asn.mmdb.gz  "$URL_ASN"
              gunzip -c /tmp/city.mmdb.gz > "$PKG/geoip/GeoLite2-City.mmdb"
              gunzip -c /tmp/asn.mmdb.gz  > "$PKG/geoip/GeoLite2-ASN.mmdb"
              rm -f /tmp/city.mmdb.gz /tmp/asn.mmdb.gz
              GEOIP_OK=1
              break
            fi
          done
          if [ "$GEOIP_OK" = "0" ]; then
            echo "WARNUNG: DB-IP Lite nicht erreichbar – Update-ZIP ohne GeoIP-DBs."
            echo "Hosts können sie über Settings → GeoIP-Datenbanken nachträglich hochladen."
            rmdir "$PKG/geoip"
          fi

          cat > "$PKG/UPDATE.md" << 'EOF'
          # Cyjan IDS Update-Paket

          Dieses ZIP enthält vorgebaute Docker-Images (images.tar.zst, inkl. der
          externen Runtime-Images) und wird über Einstellungen → System-Update
          importiert.

          Beim Import werden:
          - images.tar.zst via `zstd -dc | docker load` geladen (kein Build, kein Internet)
          - docker-compose.yml und infra/ aktualisiert
          - Container mit `docker compose up -d` neu gestartet
          - .env, .git und Datenbank bleiben unverändert

          ## Empfohlen nach dem ersten Import dieses Updates

          Einmalig auf dem Host als root ausführen, damit die Container-Log-
          Rotation (50m × 5) und der wöchentliche Docker-Maintenance-Cron
          aktiv werden:

              sudo bash /opt/ids/scripts/post-update.sh

          Idempotent — kann beliebig oft laufen, ändert nur Pfade unter
          /etc/docker/ und /etc/systemd/system/ die der API-Container nicht
          selbst bedienen kann.

          ## Remote-Taps mit-versorgen

          Nach dem Master-Update enthält /opt/ids/tap-update/ das passende
          Tap-Image-Bundle, ein Manifest und das aktuelle docker-compose.tap.yml.
          master-uplink serviert sie via mTLS unter /tap-update/<file>. Auf
          jedem gepairten Tap reicht dann:

              sudo cyjan-tap update --from-master

          Pull-basiert — der Tap zieht selbst, kein Master-Push. Hash-
          Verifikation gegen das Manifest, anschließend `docker load` +
          `compose up -d --force-recreate`. Outage-Buffer fängt die ~30 s
          Restart-Lücke ab.

          ## Notfall-Wiederherstellung

          Falls die GUI-Update-Pipeline scheitert (z.B. weil eine sehr alte
          API-Version im Container das aktuelle Bundle-Format nicht erkennt
          und daraufhin in den Build-Pfad fällt), liegt nach der Extraktion
          alles unter /opt/ids/ und das Recovery-Script erledigt den Rest:

              sudo bash /opt/ids/recover.sh
          EOF

          # Recovery-Script: lädt das Image-Bundle direkt vom Host und startet
          # den Stack. Wird nur gebraucht wenn die API-Pipeline scheitert (z.B.
          # nach Format-Wechsel auf Maschinen mit alter API-Version, die das
          # Bundle als reguläre Datei extrahiert hat statt als Bundle).
          cat > "$PKG/recover.sh" << 'EOF'
          #!/bin/sh
          # Cyjan IDS – Notfall-Wiederherstellung nach gescheitertem GUI-Update.
          # Lädt das Image-Bundle aus /opt/ids und startet den Stack neu.
          set -eu
          IDS_DIR="/opt/ids"
          cd "$IDS_DIR"

          PROFILE="$(cat /etc/cyjan/profile 2>/dev/null || echo prod)"
          echo "Compose-Profil: $PROFILE"

          if [ -f images.tar.zst ]; then
            if ! command -v zstd >/dev/null 2>&1; then
              echo "FEHLER: zstd fehlt auf dem Host."
              echo "  - Online: sudo apt install -y zstd"
              echo "  - Offline: zstd-Binary von einer anderen Maschine nach"
              echo "    /usr/local/bin/ kopieren und chmod +x setzen."
              exit 1
            fi
            echo "Lade images.tar.zst via zstd -dc | docker load ..."
            zstd -dc images.tar.zst | docker load
            rm -f images.tar.zst
          elif [ -f images.tar.gz ]; then
            echo "Lade images.tar.gz via gunzip -c | docker load ..."
            gunzip -c images.tar.gz | docker load
            rm -f images.tar.gz
          elif [ -f images.tar ]; then
            echo "Lade images.tar ..."
            docker load -i images.tar
            rm -f images.tar
          else
            echo "Kein Image-Bundle gefunden – fahre nur mit compose up fort."
          fi

          echo "Starte Stack mit Profil $PROFILE ..."
          docker compose --project-directory "$IDS_DIR" --profile "$PROFILE" up -d
          echo "Fertig."
          EOF
          chmod +x "$PKG/recover.sh"

          zip -r "${PKG}.zip" "$PKG/"
          # Stabiler Alias-Name für externe Permalinks via
          # /releases/latest/download/cyjan-ids-update-latest.zip
          PKG_LATEST="cyjan-ids-update-latest.zip"
          cp "${PKG}.zip" "${PKG_LATEST}"
          echo "Paketgröße: $(du -sh ${PKG}.zip | cut -f1)"
          echo "PKG_ZIP=${PKG}.zip" >> "$GITHUB_ENV"
          echo "PKG_ZIP_LATEST=${PKG_LATEST}" >> "$GITHUB_ENV"

      - name: Update-Paket als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: update-package
          path: "*.zip"
          retention-days: 30

      - name: GitHub Release erweitern (nur bei Tag-Push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.PKG_ZIP }}
            ${{ env.PKG_ZIP_LATEST }}
          fail_on_unmatched_files: true

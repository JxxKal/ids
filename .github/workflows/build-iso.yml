name: Build Cyjan IDS ISO

on:
  push:
    tags:
      - 'v*'           # Release-Tag: v1.0.0, v1.2.3
  workflow_dispatch:   # Manuell auslösbar
    inputs:
      release:
        description: 'Als GitHub Release veröffentlichen?'
        type: boolean
        default: false

jobs:
  build-iso:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      contents: write   # Für Release-Asset-Upload

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: System-Abhängigkeiten installieren
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            isolinux \
            syslinux-common \
            grub-efi-amd64-bin \
            grub-pc-bin \
            mtools \
            dosfstools

      - name: Disk-Platz prüfen
        run: df -h

      - name: live-build konfigurieren
        working-directory: distro
        run: sudo lb config

      - name: ISO bauen
        working-directory: distro
        run: |
          sudo lb build 2>&1 | tee ../build.log
          echo "Build abgeschlossen"
          ls -lh live-image-amd64.hybrid.iso 2>/dev/null || \
            ls -lh *.iso 2>/dev/null || \
            (echo "FEHLER: Keine ISO gefunden!" && exit 1)

      - name: ISO umbenennen
        working-directory: distro
        run: |
          ISO_SRC=$(ls live-image-amd64.hybrid.iso *.iso 2>/dev/null | head -1)
          ISO_NAME="cyjan-ids-$(git -C .. describe --tags --always).iso"
          cp "$ISO_SRC" "../${ISO_NAME}"
          echo "ISO_NAME=${ISO_NAME}" >> $GITHUB_ENV
          echo "ISO gebaut: ${ISO_NAME} ($(du -sh ../${ISO_NAME} | cut -f1))"

      - name: ISO als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: cyjan-ids-iso
          path: ${{ env.ISO_NAME }}
          retention-days: 30

      - name: Build-Log als Artefakt hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: GitHub Release erstellen (bei Tag-Push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ISO_NAME }}
          body: |
            ## Cyjan IDS ${{ github.ref_name }}

            ### Installation
            1. ISO auf USB-Stick schreiben: `dd if=${{ env.ISO_NAME }} of=/dev/sdX bs=4M status=progress`
            2. Von USB-Stick booten (UEFI oder BIOS)
            3. First-Boot-Wizard startet automatisch

            ### Konfiguration
            Der Setup-Wizard führt durch:
            - Proxy-Einstellungen
            - Passwörter & Sicherheitsschlüssel
            - Netzwerk-Interfaces
            - IRMA-Integration (optional)

            ### Update nach Installation
            ```bash
            sudo ids-update
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}

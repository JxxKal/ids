name: Build Cyjan IDS ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release:
        description: 'Als GitHub Release veröffentlichen?'
        type: boolean
        default: false

jobs:
  build-iso:
    # Debian Bookworm Container: live-build unterstützt hier alle Optionen.
    # --privileged ist zwingend – lb build mountet Filesysteme im Chroot.
    runs-on: ubuntu-24.04
    container:
      image: debian:bookworm
      options: --privileged
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Tags holen damit git describe die richtige Version findet

      - name: System-Abhängigkeiten installieren
        shell: bash
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            live-build debootstrap squashfs-tools xorriso \
            isolinux syslinux-common grub-efi-amd64-bin grub-pc-bin \
            mtools dosfstools ca-certificates git curl
          echo "live-build: $(lb --version)"
          df -h /

      - name: Konfigurieren, Bauen und ISO sichern
        id: build
        shell: bash
        run: |
          set -euo pipefail
          LOG="${GITHUB_WORKSPACE}/build.log"
          touch "$LOG"

          log() { echo "$*" | tee -a "$LOG"; }

          log "=== Version-Marker schreiben ==="
          VERSION=$(git -C "${GITHUB_WORKSPACE}" describe --tags --always 2>/dev/null || echo "dev")
          BUILD_TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BUILD_COMMIT=$(git -C "${GITHUB_WORKSPACE}" rev-parse HEAD 2>/dev/null || echo "?")
          mkdir -p "${GITHUB_WORKSPACE}/distro/config/includes.chroot/etc"
          {
            echo "VERSION=${VERSION}"
            echo "BUILD_TS=${BUILD_TS}"
            echo "BUILD_COMMIT=${BUILD_COMMIT}"
          } > "${GITHUB_WORKSPACE}/distro/config/includes.chroot/etc/cyjan-version"
          cat "${GITHUB_WORKSPACE}/distro/config/includes.chroot/etc/cyjan-version" | tee -a "$LOG"

          log "=== lb config ==="
          cd "${GITHUB_WORKSPACE}/distro"
          cat auto/config | tee -a "$LOG"
          # Kein sudo nötig – Container läuft als root
          lb config 2>&1 | tee -a "$LOG"

          log "=== lb config/binary ==="
          cat config/binary 2>/dev/null | tee -a "$LOG" || true

          log "=== lb build ==="
          lb build 2>&1 | tee -a "$LOG"

          ISO=$(ls live-image-amd64.hybrid.iso *.iso 2>/dev/null | head -1 || true)
          if [ -z "$ISO" ]; then
            log "FEHLER: Keine ISO-Datei gefunden"
            ls -la | tee -a "$LOG"
            exit 1
          fi

          VERSION=$(git -C "${GITHUB_WORKSPACE}" describe --tags --always 2>/dev/null || echo "dev")
          ISO_NAME="cyjan-ids-${VERSION}.iso"
          cp "$ISO" "${GITHUB_WORKSPACE}/${ISO_NAME}"
          echo "iso_name=${ISO_NAME}" >> "$GITHUB_OUTPUT"
          log "ISO: ${ISO_NAME} ($(du -sh "${GITHUB_WORKSPACE}/${ISO_NAME}" | cut -f1))"

      - name: Build-Log hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn
          retention-days: 7

      - name: ISO als Artefakt hochladen
        if: steps.build.outputs.iso_name != ''
        uses: actions/upload-artifact@v4
        with:
          name: cyjan-ids-iso
          path: ${{ steps.build.outputs.iso_name }}
          retention-days: 30

      - name: GitHub Release erstellen (bei Tag-Push)
        if: startsWith(github.ref, 'refs/tags/v') && steps.build.outputs.iso_name != ''
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build.outputs.iso_name }}
          body: |
            ## Cyjan IDS ${{ github.ref_name }}

            Live-ISO mit integriertem Disk-Installer – einmal vom USB booten, Festplatte
            wählen, neu starten, der First-Boot-Wizard übernimmt den Rest. Nach dem
            Wizard läuft der komplette Cyjan-IDS-Stack (Sniffer, Flow-Aggregator, ML-
            Engine, Signaturen, API, Frontend) und ist über das Web-Interface erreichbar.

            ### Installation

            1. ISO auf USB-Stick schreiben:
               ```bash
               sudo dd if=${{ steps.build.outputs.iso_name }} of=/dev/sdX bs=4M status=progress conv=fsync
               ```
            2. Vom USB booten (UEFI oder Legacy/BIOS).
            3. Boot-Menü → **"Cyjan IDS – Auf Festplatte installieren"** (Default nach 5 s).
            4. Zielfestplatte wählen – ≥ 20 GB, alle Daten werden gelöscht.
            5. Nach dem Reboot vom internen Datenträger startet der First-Boot-Wizard
               automatisch auf der Konsole.

            ### First-Boot-Wizard konfiguriert
            - Proxy (HTTP/HTTPS/No-Proxy) für Updates und Docker-Image-Pulls
            - Management- und Mirror/SPAN-Interface (Auswahl aus Live-NIC-Liste)
            - Optional: statische IP statt DHCP
            - Postgres-Passwort, JWT-Secret, MinIO-Credentials (Default: Zufallswerte,
              URL-sichere Charset)
            - Systembenutzer-Passwörter für `ids` (Console/SSH) und `root` (sudo)
            - IRMA-Integration (REST-Poll, optional)
            - Suricata-Profil (optional)

            Step 0 des Wizards zieht vor der `.env`-Erzeugung `git pull` und ersetzt
            sich selbst – ein älteres ISO bekommt damit die neuesten Wizard-Fixes,
            ohne dass man neu installieren muss.

            ### Erstanmeldung
            - Web-Interface: `http://<management-ip>/`
            - API / Swagger: `http://<management-ip>:8001/api/docs`
            - Default-Login: **`admin` / `admin-change-me`** → sofort ändern.

            ### Update nach Installation
            ```bash
            sudo ids-update     # git pull + nur betroffene Images neu bauen
            ```

            ### Konfiguration nachträglich ändern
            ```bash
            sudo ids-setup      # Wizard erneut, .env wird überschrieben
            ```
            Oder gezielt `/opt/ids/.env` editieren und `cd /opt/ids && sudo docker compose up -d`.

            ### Standard-Zugänge nach der Installation
            - Console-User: `ids` (Autologin auf TTY1, SSH erlaubt)
            - Default-Passwörter aus der ISO: `ids` und root unverändert – im Wizard
              ändern (Schritt „Systembenutzer-Passwörter") oder mit `sudo passwd ids` /
              `sudo passwd root`.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
